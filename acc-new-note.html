<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — New Note</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <header class="pay-sheet__header">
          <a class="pay-sheet__back" href="acc-log-notes.html" aria-label="Back">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
              <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <span class="pay-sheet__title">New Note</span>
          <span class="pay-sheet__back" aria-hidden="true"></span>
        </header>
        <div class="pay-sheet__sep"></div>

        <div class="pay-sheet__body">

          <label class="nm-field-label">Date</label>
          <div class="nm-input nm-input--readonly">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="2" width="14" height="13" rx="2" stroke="#b2de61" stroke-width="1.4"/>
              <path d="M1 6h14" stroke="#b2de61" stroke-width="1.4"/>
              <path d="M5 1v2M11 1v2" stroke="#b2de61" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <span style="flex:1;">05/18/2026</span>
            <span style="width:20px;height:20px;border-radius:50%;background:#b2de61;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.5 6.5L9 1" stroke="#112719" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>

          <label class="nm-field-label">Category</label>
          <div class="nm-select-wrap">
            <span class="nm-select-text">Committee Review</span>
            <span class="nm-select-check">
              <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.5 6.5L9 1" stroke="#112719" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>

          <label class="nm-field-label">Note</label>
          <textarea class="nm-textarea" placeholder="Add your committee note here…"></textarea>

          <a class="nm-attachment" href="#">
            <svg width="18" height="20" viewBox="0 0 18 20" fill="none">
              <path d="M10 1H3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7l-7-6Z" stroke="#b2de61" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 1v6h6" stroke="#b2de61" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="nm-attachment__label">Add Attachment</span>
          </a>

        </div><!-- /.pay-sheet__body -->

        <div class="pay-sheet__footer">
          <a class="pay-continue" href="acc-post-confirm.html">Post</a>
        </div>

      </div><!-- /.pay-sheet -->
    </div><!-- /.pay-screen -->
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
