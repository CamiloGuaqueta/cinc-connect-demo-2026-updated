<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#235237" />
  <title>CINC Connect � Home Owner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="app-frame">
    <main class="ar-homeowner">

      <!-- Inline header -->
      <header class="ar-homeowner__header">
        <a class="ar-homeowner__back" href="accounts-receivable.html" aria-label="Back">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 1L1 9L9 17" stroke="#FFF8EA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <span class="ar-homeowner__header-title">Home Owner</span>
      </header>

      <!-- Hero with avatar -->
      <div class="ar-homeowner__hero">
        <div class="ar-homeowner__hero-bg" style="background-image: url('assets/images/Community-aerial.jpg')"></div>
        <div class="ar-homeowner__hero-overlay"></div>
        <img class="ar-homeowner__avatar" src="assets/personas/thomas-bravo.png" alt="Thomas Bravo" />
        <h2 class="ar-homeowner__name">Thomas Bravo</h2>
      </div>

      <!-- Body content -->
      <div class="ar-homeowner__body">

        <!-- Primary contact card -->
        <div class="ar-homeowner__card">
          <a class="ar-homeowner__row" href="#">
            <img class="ar-homeowner__row-icon" src="assets/icons/icon-more-profile.svg" alt="" />
            <div class="ar-homeowner__row-text">
              <p class="ar-homeowner__row-primary ar-homeowner__row-primary--lime">12346 Washington Avenue</p>
              <p class="ar-homeowner__row-sub">Acct: 1588 : 6523</p>
            </div>
          </a>
          <div class="ar-homeowner__divider"></div>
          <a class="ar-homeowner__row" href="mailto:thomasb@testemail.com">
            <img class="ar-homeowner__row-icon" src="assets/icons/icon-email.svg" alt="" />
            <p class="ar-homeowner__row-primary">thomasb@testemail.com</p>
          </a>
          <div class="ar-homeowner__divider"></div>
          <a class="ar-homeowner__row" href="tel:+15553455670">
            <img class="ar-homeowner__row-icon" src="assets/icons/icon-sms.svg" alt="" />
            <p class="ar-homeowner__row-primary">+1 555.345.567</p>
          </a>
        </div>

        <!-- Emergency contact -->
        <h3 class="ar-homeowner__section-title">Emergency contact</h3>
        <div class="ar-homeowner__card">
          <a class="ar-homeowner__row" href="#">
            <img class="ar-homeowner__row-icon" src="assets/icons/icon-more-profile.svg" alt="" />
            <p class="ar-homeowner__row-primary">Monica Bravo</p>
          </a>
          <div class="ar-homeowner__divider"></div>
          <a class="ar-homeowner__row" href="mailto:monicab@testemail.com">
            <img class="ar-homeowner__row-icon" src="assets/icons/icon-email.svg" alt="" />
            <p class="ar-homeowner__row-primary">Monicab@testemail.com</p>
          </a>
          <div class="ar-homeowner__divider"></div>
          <a class="ar-homeowner__row" href="tel:+15552346556">
            <img class="ar-homeowner__row-icon" src="assets/icons/icon-sms.svg" alt="" />
            <p class="ar-homeowner__row-primary">+1 555.23465.567</p>
          </a>
        </div>

      </div>
    </main>

    <!-- Bottom Navigation (My To-Dos active) -->
    <nav class="bottom-nav" aria-label="Main navigation">
      <a class="bottom-nav__item" href="feed.html" aria-label="Feed">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-1-feed.svg" alt="" /></span>
        <span class="bottom-nav__label">Feed</span>
      </a>
      <a class="bottom-nav__item bottom-nav__item--active" href="todos.html" aria-label="My To-Dos">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-2-todos.svg" alt="" />
          <span class="bottom-nav__nav-badge">3</span>
        </span>
        <span class="bottom-nav__label">My To-Dos</span>
      </a>
      <a class="bottom-nav__item" href="concierge.html" aria-label="Concierge">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-3-concierge.svg" alt="" /></span>
        <span class="bottom-nav__label">Concierge</span>
      </a>
      <a class="bottom-nav__item" href="pinboard.html" aria-label="PinBoard">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-4-pinboard.svg" alt="" /></span>
        <span class="bottom-nav__label">PinBoard</span>
      </a>
      <a class="bottom-nav__item" href="financial.html" aria-label="Financial">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-5-financial.svg" alt="" /></span>
        <span class="bottom-nav__label">Financial</span>
      </a>
      <a class="bottom-nav__item" href="messages.html" aria-label="Chat">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-6-messages.svg" alt="" /></span>
        <span class="bottom-nav__label">Chat</span>
      </a>
      <a class="bottom-nav__item" href="more.html" aria-label="More">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-7-menu.svg" alt="" /></span>
        <span class="bottom-nav__label">More</span>
      </a>
    </nav>
  </div>

  <script src="scripts/auth.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    (function () {
      if (!window.CincAuth.requireAuth()) return;

      // Dynamic back destination via ?back= query param
      var params = new URLSearchParams(window.location.search);
      var backUrl = params.get('back');
      if (backUrl) {
        var backBtn = document.querySelector('.ar-homeowner__back');
        if (backBtn) backBtn.setAttribute('href', backUrl);
      }
    })();
  </script>
</body>
</html>
