<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Account Info</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=2" />
</head>
<body>
  <div class="app-frame">
    <main class="acct-info">

      <!-- App Header -->
      <header class="app-header">
        <a class="app-header__back" href="board-action-items.html" aria-label="Back">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
            <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <a class="app-header__notification" href="notifications.html">
          <img src="assets/icons/icon-notification-bell.svg" alt="Notifications" />
          <span class="app-header__badge">3</span>
        </a>
      </header>

      <!-- Title -->
      <div class="ar-violations__topbar">
        <h1 class="ar-violations__title">Account Info</h1>
      </div>

      <!-- Account card — ar-vcard pattern -->
      <div class="ar-violations__cards">
        <div class="ar-vcard">

          <!-- Account summary -->
          <div class="ar-vcard__meta">
            <p class="ar-vcard__meta-line"><strong>Acct:</strong> 1588:6523</p>
            <p class="ar-vcard__address">12346 Washington Avenue</p>
            <p class="ar-vcard__meta-line"><strong>Total Balance:</strong> $2,550.83</p>
          </div>

          <div class="ar-vcard__divider"></div>

          <!-- Owner: Thomas Bravo — opens green sheet -->
          <button class="ar-vcard__owner" type="button" data-owner="thomas">
            <img class="ar-vcard__owner-avatar" src="assets/personas/thomas-bravo.png" alt="Thomas Bravo" />
            <div class="ar-vcard__owner-info">
              <span class="ar-vcard__owner-name">Thomas Bravo</span>
              <span class="ar-vcard__owner-role">Home Owner</span>
            </div>
            <span class="ar-card__chev" aria-hidden="true"></span>
          </button>

          <div class="ar-vcard__divider"></div>

          <!-- Account Ledger -->
          <a class="ar-vcard__row" href="board-account-ledger.html">
            <img class="ar-vcard__row-icon" src="assets/icons/icon-tile-account-ledger.svg" alt="" style="width:22px;height:22px;filter:brightness(0) saturate(100%) invert(76%) sepia(40%) saturate(500%) hue-rotate(40deg) brightness(110%);" />
            <span class="ar-vcard__row-label">Account Ledger</span>
            <span class="ar-card__chev" aria-hidden="true"></span>
          </a>

          <div class="ar-vcard__divider"></div>

          <!-- Collections -->
          <a class="ar-vcard__row" href="ar-collections.html">
            <img class="ar-vcard__row-icon" src="assets/icons/icon-collections.svg" alt="" style="width:22px;height:22px;filter:brightness(0) saturate(100%) invert(76%) sepia(40%) saturate(500%) hue-rotate(40deg) brightness(110%);" />
            <span class="ar-vcard__row-label">Collections</span>
            <span class="ar-card__chev" aria-hidden="true"></span>
          </a>

          <div class="ar-vcard__divider"></div>

          <!-- Violations -->
          <a class="ar-vcard__row" href="ar-violations.html">
            <img class="ar-vcard__row-icon" src="assets/icons/icon-todo-4-violation.svg" alt="" style="width:22px;height:22px;filter:brightness(0) saturate(100%) invert(76%) sepia(40%) saturate(500%) hue-rotate(40deg) brightness(110%);" />
            <span class="ar-vcard__row-label">Violations</span>
            <span class="ar-card__chev" aria-hidden="true"></span>
          </a>

          <div class="ar-vcard__divider"></div>

          <!-- Work Orders -->
          <a class="ar-vcard__row" href="board-workorders.html">
            <img class="ar-vcard__row-icon" src="assets/icons/icon-todo-5-work-order.svg" alt="" style="width:22px;height:22px;filter:brightness(0) saturate(100%) invert(76%) sepia(40%) saturate(500%) hue-rotate(40deg) brightness(110%);" />
            <span class="ar-vcard__row-label">Work Orders</span>
            <span class="ar-card__chev" aria-hidden="true"></span>
          </a>

        </div>
      </div><!-- /.ar-violations__cards -->

    </main>

    <!-- Bottom Navigation (To-Dos active) -->
    <nav class="bottom-nav" aria-label="Main navigation">
      <a class="bottom-nav__item" href="feed.html" aria-label="Feed">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-1-feed.svg" alt="" /></span>
        <span class="bottom-nav__label">Feed</span>
      </a>
      <a class="bottom-nav__item bottom-nav__item--active" href="todos.html" aria-label="My To-Dos">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-2-todos.svg" alt="" /><span class="bottom-nav__nav-badge">3</span></span>
        <span class="bottom-nav__label">My To-Dos</span>
      </a>
      <a class="bottom-nav__item" href="concierge.html" aria-label="Concierge">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-3-concierge.svg" alt="" /></span>
        <span class="bottom-nav__label">Concierge</span>
      </a>
      <a class="bottom-nav__item" href="pinboard.html" aria-label="PinBoard">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-4-pinboard.svg" alt="" /></span>
        <span class="bottom-nav__label">PinBoard</span>
      </a>
      <a class="bottom-nav__item" href="financial.html" aria-label="Financial">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-5-financial.svg" alt="" /></span>
        <span class="bottom-nav__label">Financial</span>
      </a>
      <a class="bottom-nav__item" href="messages.html" aria-label="Chat">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-6-messages.svg" alt="" /></span>
        <span class="bottom-nav__label">Chat</span>
      </a>
      <a class="bottom-nav__item" href="more.html" aria-label="More">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-7-menu.svg" alt="" /></span>
        <span class="bottom-nav__label">Menu</span>
      </a>
    </nav>
  </div>

  <!-- Backdrop -->
  <div class="ho-sheet-backdrop" id="hoBackdrop"></div>

  <!-- Homeowner Green Sheet (outside .app-frame) -->
  <div class="ho-sheet" id="hoSheet" aria-hidden="true">

    <div class="ho-sheet__header">
      <button class="ho-sheet__back" id="hoSheetClose" aria-label="Close">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="ho-sheet__title">Home Owner</span>
    </div>

    <div class="ho-sheet__hero">
      <div class="ho-sheet__hero-bg" style="background-image: url('assets/images/Community-aerial.jpg')"></div>
      <div class="ho-sheet__hero-overlay"></div>
      <img class="ho-sheet__avatar" id="hoAvatar" src="" alt="" />
      <div class="ho-sheet__avatar-initials ho-sheet__avatar-initials--hidden" id="hoAvatarInitials"></div>
      <h2 class="ho-sheet__name" id="hoName"></h2>
    </div>

    <div class="ho-sheet__body">
      <div class="ho-sheet__card" id="hoContactCard">
        <div class="ho-sheet__row">
          <img class="ho-sheet__row-icon" src="assets/icons/icon-more-profile.svg" alt="" />
          <div class="ho-sheet__row-text">
            <p class="ho-sheet__row-primary ho-sheet__row-primary--lime" id="hoAddress"></p>
            <p class="ho-sheet__row-sub" id="hoAcct"></p>
          </div>
        </div>
        <div class="ho-sheet__divider"></div>
        <a class="ho-sheet__row" id="hoEmail" href="#">
          <img class="ho-sheet__row-icon" src="assets/icons/icon-email.svg" alt="" />
          <p class="ho-sheet__row-primary" id="hoEmailText"></p>
        </a>
        <div class="ho-sheet__divider"></div>
        <a class="ho-sheet__row" id="hoPhone" href="#">
          <img class="ho-sheet__row-icon" src="assets/icons/icon-sms.svg" alt="" />
          <p class="ho-sheet__row-primary" id="hoPhoneText"></p>
        </a>
      </div>

      <h3 class="ho-sheet__section-title">Emergency contact</h3>
      <div class="ho-sheet__card" id="hoEmergencyCard">
        <div class="ho-sheet__row">
          <img class="ho-sheet__row-icon" src="assets/icons/icon-more-profile.svg" alt="" />
          <p class="ho-sheet__row-primary" id="hoEmergencyName"></p>
        </div>
        <div class="ho-sheet__divider"></div>
        <a class="ho-sheet__row" id="hoEmergencyEmail" href="#">
          <img class="ho-sheet__row-icon" src="assets/icons/icon-email.svg" alt="" />
          <p class="ho-sheet__row-primary" id="hoEmergencyEmailText"></p>
        </a>
        <div class="ho-sheet__divider"></div>
        <a class="ho-sheet__row" id="hoEmergencyPhone" href="#">
          <img class="ho-sheet__row-icon" src="assets/icons/icon-sms.svg" alt="" />
          <p class="ho-sheet__row-primary" id="hoEmergencyPhoneText"></p>
        </a>
      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
  <script>
    (function () {
      // Dynamic back destination via ?back= query param
      var params = new URLSearchParams(window.location.search);
      var backUrl = params.get('back');
      if (backUrl) {
        var backBtn = document.querySelector('.app-header__back');
        if (backBtn) backBtn.setAttribute('href', backUrl);
      }

      const OWNERS = {
        thomas: {
          name:    'Thomas Bravo',
          photo:   'assets/personas/thomas-bravo.png',
          initials: null,
          address: '12346 Washington Avenue',
          acct:    'Acct: 1588 : 6523',
          email:   'thomasb@testemail.com',
          phone:   '+1 555.345.567',
          emergency: { name: 'Monica Bravo', email: 'monicab@testemail.com', phone: '+1 555.234.655' }
        }
      };

      const sheet       = document.getElementById('hoSheet');
      const backdrop    = document.getElementById('hoBackdrop');
      const closeBtn    = document.getElementById('hoSheetClose');
      const hoAvatar    = document.getElementById('hoAvatar');
      const hoAvatarIni = document.getElementById('hoAvatarInitials');
      const hoName      = document.getElementById('hoName');
      const hoAddress   = document.getElementById('hoAddress');
      const hoAcct      = document.getElementById('hoAcct');
      const hoEmailEl   = document.getElementById('hoEmail');
      const hoEmailTxt  = document.getElementById('hoEmailText');
      const hoPhoneEl   = document.getElementById('hoPhone');
      const hoPhoneTxt  = document.getElementById('hoPhoneText');
      const hoEmgName   = document.getElementById('hoEmergencyName');
      const hoEmgEmail  = document.getElementById('hoEmergencyEmail');
      const hoEmgEmailT = document.getElementById('hoEmergencyEmailText');
      const hoEmgPhone  = document.getElementById('hoEmergencyPhone');
      const hoEmgPhoneT = document.getElementById('hoEmergencyPhoneText');

      function openSheet(ownerKey) {
        const d = OWNERS[ownerKey];
        if (!d) return;

        hoName.textContent      = d.name;
        hoAddress.textContent   = d.address;
        hoAcct.textContent      = d.acct;
        hoEmailTxt.textContent  = d.email;
        hoEmailEl.href          = 'mailto:' + d.email;
        hoPhoneTxt.textContent  = d.phone;
        hoPhoneEl.href          = 'tel:' + d.phone.replace(/[^+\d]/g, '');
        hoEmgName.textContent   = d.emergency.name;
        hoEmgEmailT.textContent = d.emergency.email;
        hoEmgEmail.href         = 'mailto:' + d.emergency.email;
        hoEmgPhoneT.textContent = d.emergency.phone;
        hoEmgPhone.href         = 'tel:' + d.emergency.phone.replace(/[^+\d]/g, '');

        if (d.photo) {
          hoAvatar.src = d.photo;
          hoAvatar.style.display = 'block';
          hoAvatarIni.classList.add('ho-sheet__avatar-initials--hidden');
        } else {
          hoAvatar.style.display = 'none';
          hoAvatarIni.textContent = d.initials;
          hoAvatarIni.classList.remove('ho-sheet__avatar-initials--hidden');
        }

        backdrop.classList.add('ho-sheet-backdrop--open');
        sheet.style.display = 'flex';
        sheet.setAttribute('aria-hidden', 'false');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            sheet.classList.add('ho-sheet--open');
          });
        });
      }

      function closeSheet() {
        sheet.classList.remove('ho-sheet--open');
        backdrop.classList.remove('ho-sheet-backdrop--open');
        setTimeout(() => {
          sheet.style.display = 'none';
          sheet.setAttribute('aria-hidden', 'true');
        }, 370);
      }

      closeBtn.addEventListener('click', closeSheet);
      backdrop.addEventListener('click', closeSheet);

      document.querySelectorAll('[data-owner]').forEach((btn) => {
        btn.addEventListener('click', () => openSheet(btn.getAttribute('data-owner')));
      });
    })();
  </script>
</body>
</html>
