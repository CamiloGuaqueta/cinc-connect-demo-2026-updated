<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Account Info</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css" />
</head>
<body>
  <div class="app-frame">
    <main class="acct-info">

      <!-- App Header -->
      <header class="app-header">
        <a class="app-header__back" href="board-action-items.html" aria-label="Back">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
            <path d="M9 1L1 9L9 17" stroke="#fff8ea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <a class="app-header__notification" href="notifications.html">
          <img src="assets/icons/icon-notification-bell.svg" alt="Notifications" />
          <span class="app-header__badge">3</span>
        </a>
      </header>

      <h1 class="acct-info__title">Account Info</h1>

      <div class="acct-info__card">

        <!-- Account summary -->
        <div class="acct-info__summary">
          <p class="acct-info__acct"><strong>Acct:</strong> 1588:6523</p>
          <p class="acct-info__address">12346 Washington Avenue</p>
          <p class="acct-info__balance"><strong>Total Balance:</strong> <span>$2,550.83</span></p>
        </div>

        <!-- Owner row -->
        <a class="acct-info__owner" href="#">
          <img class="acct-info__owner-avatar" src="assets/personas/avatar-2.png" alt="Thomas Bravo" />
          <div class="acct-info__owner-info">
            <span class="acct-info__owner-name">Thomas Bravo</span>
            <span class="acct-info__owner-role">Owner</span>
          </div>
          <span class="board-ai__row-chev"></span>
        </a>

        <!-- Nav rows -->
        <a class="board-ai__row" href="account-ledger.html">
          <span class="board-ai__row-icon">
            <img src="assets/icons/icon-tile-account-ledger.svg" alt="" style="width:22px;height:22px;filter:brightness(0) saturate(100%) invert(76%) sepia(40%) saturate(500%) hue-rotate(40deg) brightness(110%);" />
          </span>
          <div class="board-ai__row-info">
            <span class="board-ai__row-label">Account Ledger</span>
          </div>
          <div class="board-ai__row-right">
            <span class="board-ai__row-chev"></span>
          </div>
        </a>

        <a class="board-ai__row" href="#">
          <span class="board-ai__row-icon">
            <img src="assets/icons/icon-collections.svg" alt="" style="width:22px;height:22px;filter:brightness(0) saturate(100%) invert(76%) sepia(40%) saturate(500%) hue-rotate(40deg) brightness(110%);" />
          </span>
          <div class="board-ai__row-info">
            <span class="board-ai__row-label">Collections</span>
          </div>
          <div class="board-ai__row-right">
            <span class="board-ai__row-chev"></span>
          </div>
        </a>

        <a class="board-ai__row" href="ar-violations.html">
          <span class="board-ai__row-icon">
            <img src="assets/icons/icon-todo-4-violation.svg" alt="" style="width:22px;height:22px;filter:brightness(0) saturate(100%) invert(76%) sepia(40%) saturate(500%) hue-rotate(40deg) brightness(110%);" />
          </span>
          <div class="board-ai__row-info">
            <span class="board-ai__row-label">Violations</span>
          </div>
          <div class="board-ai__row-right">
            <span class="board-ai__row-chev"></span>
          </div>
        </a>

        <a class="board-ai__row" href="#">
          <span class="board-ai__row-icon">
            <img src="assets/icons/icon-todo-5-work-order.svg" alt="" style="width:22px;height:22px;filter:brightness(0) saturate(100%) invert(76%) sepia(40%) saturate(500%) hue-rotate(40deg) brightness(110%);" />
          </span>
          <div class="board-ai__row-info">
            <span class="board-ai__row-label">Work Orders</span>
          </div>
          <div class="board-ai__row-right">
            <span class="board-ai__row-chev"></span>
          </div>
        </a>

      </div><!-- /.acct-info__card -->

    </main>

    <!-- Bottom Navigation (To-Dos active) -->
    <nav class="bottom-nav" aria-label="Main navigation">
      <a class="bottom-nav__item" href="feed.html" aria-label="Feed">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-1-feed.svg" alt="" /></span>
        <span class="bottom-nav__label">Feed</span>
      </a>
      <a class="bottom-nav__item bottom-nav__item--active" href="todos.html" aria-label="My To-Dos">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-2-todos.svg" alt="" /><span class="bottom-nav__nav-badge">3</span></span>
        <span class="bottom-nav__label">My To-Dos</span>
      </a>
      <a class="bottom-nav__item" href="concierge.html" aria-label="Concierge">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-3-concierge.svg" alt="" /></span>
        <span class="bottom-nav__label">Concierge</span>
      </a>
      <a class="bottom-nav__item" href="pinboard.html" aria-label="PinBoard">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-4-pinboard.svg" alt="" /></span>
        <span class="bottom-nav__label">PinBoard</span>
      </a>
      <a class="bottom-nav__item" href="financial.html" aria-label="Financial">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-5-financial.svg" alt="" /></span>
        <span class="bottom-nav__label">Financial</span>
      </a>
      <a class="bottom-nav__item" href="messages.html" aria-label="Chat">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-6-messages.svg" alt="" /></span>
        <span class="bottom-nav__label">Chat</span>
      </a>
      <a class="bottom-nav__item" href="more.html" aria-label="More">
        <span class="bottom-nav__icon-wrap"><img src="assets/icons/nav-7-menu.svg" alt="" /></span>
        <span class="bottom-nav__label">Menu</span>
      </a>
    </nav>
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
