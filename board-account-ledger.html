  <!-- Detail Sheet (outside app-frame, position: fixed) -->
  <div class="detail-sheet" id="detailSheet" aria-hidden="true">

    <!-- Green header -->
    <div class="detail-sheet__header">
      <span class="detail-sheet__title" id="dsTitle">Charge Detail</span>
      <button class="detail-sheet__close" id="dsClose" type="button">Close</button>
    </div>
    <div class="detail-sheet__sep"></div>

    <!-- Scrollable body -->
    <div class="detail-sheet__body">

      <!-- Large icon -->
      <div class="detail-sheet__icon-wrap" id="dsIconWrap"></div>

      <!-- Type label -->
      <span class="detail-sheet__type-label" id="dsTypeLabel">Charge</span>

      <!-- Name card — charge / adjustment only -->
      <div class="detail-sheet__name-card" id="dsNameCard">
        <span class="detail-sheet__name" id="dsName"></span>
        <span class="detail-sheet__name-sub" id="dsNameSub"></span>
      </div>

      <!-- Info rows -->
      <div class="detail-sheet__info-card">
        <div class="detail-sheet__info-row">
          <span class="detail-sheet__info-key">Date</span>
          <span class="detail-sheet__info-val" id="dsDate"></span>
        </div>
        <!-- Payment method — payment type only -->
        <div class="detail-sheet__info-row" id="dsMethodRow" style="display:none">
          <span class="detail-sheet__info-key">Payment Method</span>
          <span class="detail-sheet__info-val" id="dsMethod">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <rect x=".5" y=".5" width="15" height="11" rx="1.5" stroke="#fff8ea" stroke-opacity=".5"/>
              <path d="M.5 3.5h15" stroke="#fff8ea" stroke-opacity=".5"/>
            </svg>
            <span id="dsMethodText"></span>
          </span>
        </div>
        <div class="detail-sheet__info-row">
          <span class="detail-sheet__info-key">Amount</span>
          <span class="detail-sheet__info-val detail-sheet__info-val--lime" id="dsAmount"></span>
        </div>
        <div class="detail-sheet__info-row">
          <span class="detail-sheet__info-key" id="dsBalanceKey">Balance After Charge</span>
          <span class="detail-sheet__info-val" id="dsBalance"></span>
        </div>
      </div>

      <!-- Done -->
      <button class="detail-sheet__done" id="dsDone" type="button">DONE</button>

    </div>
  </div>

      var dsNameSub   = document.getElementById('dsNameSub');
      var dsDate      = document.getElementById('dsDate');
      var dsMethodRow = document.getElementById('dsMethodRow');
      var dsMethodTxt = document.getElementById('dsMethodText');
      var dsAmount    = document.getElementById('dsAmount');
      var dsBalanceKey= document.getElementById('dsBalanceKey');
      var dsBalance   = document.getElementById('dsBalance');
      var dsClose     = document.getElementById('dsClose');
      var dsDone      = document.getElementById('dsDone');

      var TITLES = { charge: 'Charge Detail', payment: 'Payment Detail', adjustment: 'Adjustment Detail' };
      var LABELS = { charge: 'Charge', payment: 'Payment', adjustment: 'Adjustment' };
      var BAL_KEYS = { charge: 'Balance After Charge', payment: 'Balance After Payment', adjustment: 'Balance After Adjustment' };

      function openSheet(btn) {
        var type = btn.dataset.detail;

        // Header
        dsTitle.textContent = TITLES[type] || 'Detail';
        dsTypeLabel.textContent = LABELS[type] || type;

        // Icon
        var tpl = document.getElementById('tpl-' + type + '-icon');
        dsIconWrap.innerHTML = tpl ? tpl.innerHTML : '';

        // Name card — hide for payment
        if (type === 'payment') {
          dsNameCard.style.display = 'none';
        } else {
          dsNameCard.style.display = 'block';
          dsName.textContent = btn.dataset.name || '';
          dsNameSub.textContent = btn.dataset.subtitle || '';
        }

        // Date
        dsDate.textContent = btn.dataset.date || '';

        // Method — payment only
        if (type === 'payment') {
          dsMethodRow.style.display = 'flex';
          dsMethodTxt.textContent = btn.dataset.method || '';
        } else {
          dsMethodRow.style.display = 'none';
        }

        // Amount
        dsAmount.textContent = btn.dataset.amount || '';

        // Balance label
        dsBalanceKey.textContent = BAL_KEYS[type] || 'Balance After';
        dsBalance.textContent = btn.dataset.balance || '';

        // Show
        sheet.style.display = 'flex';
        backdrop.classList.add('detail-sheet-backdrop--open');
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            sheet.classList.add('detail-sheet--open');
            sheet.setAttribute('aria-hidden', 'false');
          });
        });
      }

      function closeSheet() {
        sheet.classList.remove('detail-sheet--open');
        backdrop.classList.remove('detail-sheet-backdrop--open');
        setTimeout(function () {
          sheet.style.display = 'none';
          sheet.setAttribute('aria-hidden', 'true');
        }, 370);
      }

      dsClose.addEventListener('click', closeSheet);
      dsDone.addEventListener('click', closeSheet);
      backdrop.addEventListener('click', closeSheet);

      document.querySelectorAll('button.ar-ledger__row').forEach(function (btn) {
        btn.addEventListener('click', function () { openSheet(btn); });
      });
    })();
  </script>
</body>
</html>
