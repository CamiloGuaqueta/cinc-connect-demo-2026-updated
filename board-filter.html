<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Filter Action Items</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=2" />
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen" style="height:100dvh;overflow:hidden;">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <header class="pay-sheet__header">
          <a class="pay-sheet__back" href="board-action-items.html" aria-label="Back">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
              <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <span class="pay-sheet__title">Search/Filter Review Items</span>
          <a class="pay-sheet__close" href="board-action-items.html" style="color:#b2de61;font-size:14px;font-weight:500;text-decoration:none;">Reset</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <div class="pay-sheet__body" style="overflow-y:auto;">

          <!-- Status section -->
          <p class="filter-section__title">Status</p>
          <div class="filter-group">
            <div class="filter-row">
              <span class="filter-radio filter-radio--selected"></span>
              <span class="filter-row__label">Not Started</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">In Progress</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Completed</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Past Due</span>
            </div>
          </div>

          <!-- Category section -->
          <p class="filter-section__title">Category</p>
          <div class="filter-group">
            <div class="filter-row">
              <span class="filter-radio filter-radio--selected"></span>
              <span class="filter-row__label">All</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Bids</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Collections</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Common Areas</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Planning</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Work Orders</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Violations</span>
            </div>
          </div>

          <!-- Due Date section -->
          <p class="filter-section__title">Due Date</p>
          <div class="filter-group">
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Past Due</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Due Soon</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Other (Custom Time Frame)</span>
            </div>
          </div>

          <p class="filter-results">4 results</p>

        </div><!-- /.pay-sheet__body -->

        <div class="pay-sheet__footer">
          <a class="pay-continue" href="board-action-items.html">Apply Filter</a>
        </div>

      </div><!-- /.pay-sheet -->
    </div><!-- /.pay-screen -->
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
