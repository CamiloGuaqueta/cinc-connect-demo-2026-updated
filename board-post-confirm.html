<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Note Posted</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css" />
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <header class="pay-sheet__header">
          <span class="pay-sheet__back" aria-hidden="true"></span>
          <span class="pay-sheet__title">New Message</span>
          <span style="width:40px"></span>
        </header>
        <div class="pay-sheet__sep"></div>

        <div class="pay-sheet__body">
          <div class="post-confirm">
            <div class="post-confirm__icon">
              <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                <path d="M6 18L14 26L30 10" stroke="#112719" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h2 class="post-confirm__title">Note Posted!</h2>
            <p class="post-confirm__sub">Your message has been added to the action item log.</p>
          </div>
        </div><!-- /.pay-sheet__body -->

        <div class="pay-sheet__footer">
          <a class="pay-continue" href="board-log-messages.html">Done</a>
        </div>

      </div><!-- /.pay-sheet -->
    </div><!-- /.pay-screen -->
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
