<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Choose Experience</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    body { background: #082818; }

    .brand-select {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 52px;
    }

    .brand-select__logo {
      width: 150px;
      margin-bottom: 36px;
    }
    .brand-select__logo img { width: 100%; }

    .brand-select__heading {
      font-family: Montserrat, sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff8ea;
      text-align: center;
      margin: 0 0 8px;
    }

    .brand-select__sub {
      font-family: Montserrat, sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 248, 234, 0.45);
      text-align: center;
      margin: 0 0 32px;
    }

    /* Stacked full-width cards */
    .brand-select__options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 24px;
    }

    .brand-select__card {
      width: 100%;
      background: #1A3527;
      border: 2px solid rgba(255, 248, 234, 0.1);
      border-radius: 16px;
      padding: 20px 20px 20px 20px;
      cursor: pointer;
      transition: border-color 200ms ease, transform 150ms ease;
      display: flex;
      align-items: center;
      gap: 16px;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .brand-select__card.is-selected {
      border-color: #b2de61;
      background: #1e3d2a;
    }

    .brand-select__card:active { transform: scale(0.98); }

    /* Color palette orb */
    .brand-select__orb {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .brand-select__orb--cinc {
      background: #112719;
      box-shadow: 0 0 0 3px #235237;
    }

    .brand-select__orb--custom {
      background: #ffffff;
      box-shadow: 0 0 0 3px #e0e0e0;
    }

    /* Logo inside orb */
    .brand-select__orb img {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    /* Card text */
    .brand-select__info { flex: 1; }

    .brand-select__card-name {
      font-family: Montserrat, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff8ea;
      margin-bottom: 4px;
    }

    .brand-select__card-desc {
      font-family: Montserrat, sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 248, 234, 0.45);
      line-height: 1.4;
    }

    /* Radio indicator */
    .brand-select__radio {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255, 248, 234, 0.25);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 200ms, background 200ms;
    }
    .brand-select__card.is-selected .brand-select__radio {
      background: #b2de61;
      border-color: #b2de61;
    }

    .brand-select__continue {
      width: 100%;
      max-width: 340px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px 24px;
      background: #b2de61;
      color: #082818;
      font-family: Montserrat, sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app-frame">
    <main class="brand-select">

      <div class="brand-select__logo">
        <img src="assets/icons/login-cinc-logo.svg" alt="CINC Connect" />
      </div>

      <h1 class="brand-select__heading">Choose your experience</h1>
      <p class="brand-select__sub">Switch at any time from the login screen</p>

      <div class="brand-select__options">

        <button class="brand-select__card is-selected" data-brand="default" type="button">
          <div class="brand-select__orb brand-select__orb--cinc">
            <img src="assets/icons/icon-cinc-logo.svg" alt="" />
          </div>
          <div class="brand-select__info">
            <div class="brand-select__card-name">CINC Connect</div>
            <div class="brand-select__card-desc">Default brand · Dark green theme</div>
          </div>
          <div class="brand-select__radio" aria-hidden="true">
            <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4l3 3 6-6" stroke="#082818" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>

        <button class="brand-select__card" data-brand="custom" type="button">
          <div class="brand-select__orb brand-select__orb--custom">
            <img src="assets/icons/Your Community app logo.svg" alt="" />
          </div>
          <div class="brand-select__info">
            <div class="brand-select__card-name">Custom Brand</div>
            <div class="brand-select__card-desc">White-labeled · Light blue theme</div>
          </div>
          <div class="brand-select__radio" aria-hidden="true">
            <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4l3 3 6-6" stroke="#082818" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>

      </div>

      <button class="btn brand-select__continue" id="continueBtn" type="button">Continue</button>

    </main>
  </div>

  <script>
    sessionStorage.setItem('cinc-splash-shown', '1');

    var selected = localStorage.getItem('cinc:demo:brand') || 'default';

    var cards = document.querySelectorAll('[data-brand]');
    cards.forEach(function (card) {
      if (card.dataset.brand === selected) card.classList.add('is-selected');
      else card.classList.remove('is-selected');

      card.addEventListener('click', function () {
        selected = card.dataset.brand;
        cards.forEach(function (c) { c.classList.remove('is-selected'); });
        card.classList.add('is-selected');
      });
    });

    document.getElementById('continueBtn').addEventListener('click', function () {
      localStorage.setItem('cinc:demo:brand', selected);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
