<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Sign Consent</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>try{if(localStorage.getItem('cinc:demo:brand')==='custom')document.documentElement.setAttribute('data-brand','custom');}catch(_){}</script>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen" style="min-height:100dvh;">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet" style="overflow:visible;flex:none;">

        <header class="pay-sheet__header" style="position:sticky;top:0;z-index:10;background:#235237;border-radius:25px 25px 0 0;">
          <a class="pay-sheet__back" href="consents.html" aria-label="Back">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
              <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <span class="pay-sheet__title" id="sheetTitle">Sign Consent</span>
          <span></span>
        </header>
        <div class="pay-sheet__sep"></div>

        <div class="pay-sheet__body" style="overflow:visible;flex:none;padding-bottom:40px;">

          <!-- Consent card header -->
          <div class="consent-card" style="margin-bottom:20px;">
            <div class="consent-card__body" style="padding:16px;">
              <p class="consent-card__title" id="consentTitle"></p>
              <p class="consent-card__article" id="consentArticle"></p>
            </div>
          </div>

          <!-- Document text -->
          <div class="consent-doc-text" id="consentText"></div>

          <!-- Email -->
          <p class="consent-field-label">Your Email:</p>
          <label class="input-group consent-email-field">
            <input class="input-group__field" type="email" id="consentEmail" readonly tabindex="-1" />
          </label>

          <!-- Signature canvas -->
          <p class="consent-field-label" style="margin-top:20px;">Your Signature:</p>
          <div class="sig-canvas-wrap">
            <canvas class="sig-canvas" id="sigCanvas" width="700" height="240"></canvas>
            <button class="sig-clear-btn" id="sigClear" type="button">Clear</button>
          </div>
          <p class="sig-canvas-hint">USE YOUR FINGER TO SIGN IN THE SPACE ABOVE</p>

          <!-- I CONSENT toggle -->
          <div class="consent-toggle-row" style="background:#235237;">
            <span class="consent-toggle-label">I CONSENT</span>
            <label class="toggle toggle--labeled" aria-label="I consent">
              <input class="toggle__input" type="checkbox" id="consentCheck" checked />
              <span class="toggle__switch">
                <span class="toggle__yes">Yes</span>
                <span class="toggle__no">No</span>
              </span>
            </label>
          </div>

          <!-- Submit -->
          <button class="btn btn--primary consent-submit-btn" id="submitBtn" type="button" disabled>SUBMIT CONSENT</button>

        </div><!-- /.pay-sheet__body -->
      </div><!-- /.pay-sheet -->
    </div><!-- /.pay-screen -->
  </div>

  <script src="scripts/auth.js"></script>
  <script>
    window.CincAuth.requireAuth();

    var CONSENTS = {
      'pet-policy': {
        type: 'User Consent',
        title: 'ANIMAL POLICY',
        article: 'Article II: Ownership and Registration',
        sections: [
          {
            heading: 'Section 1: Ownership',
            text: 'Homeowners are allowed to own dogs, cats, and other domestic animals within the Magic Views community, subject to the following rules and restrictions. All pets must be registered with the HOA management office within 30 days of acquisition or move-in.'
          },
          {
            heading: 'Section 2: Registration Requirements',
            text: 'Each pet must have a current rabies vaccination and any other vaccinations required by local ordinance. Proof of vaccination must be submitted to the management office annually. Pets must wear identification tags at all times when outside the home.'
          },
          {
            heading: 'Section 3: Leash Requirements',
            text: 'All pets must be on a leash no longer than six (6) feet when outside the owner\'s property. Pets are not allowed to roam freely in common areas without a leash. The pet owner or a responsible adult must accompany the pet at all times in common areas.'
          },
          {
            heading: 'Section 4: Waste Disposal',
            text: 'Pet owners are responsible for immediately collecting and properly disposing of their pet\'s waste in any common area, including sidewalks, green spaces, and the dog park. Failure to comply may result in fines as established by the board.'
          },
          {
            heading: 'Section 5: Nuisance Animals',
            text: 'Pets that create excessive noise, demonstrate aggressive behavior, or otherwise disturb the quiet enjoyment of other residents may be subject to removal from the community at the board\'s discretion after written notice to the owner.'
          }
        ]
      },
      'rules': {
        type: 'Unit Consent',
        title: 'COMMUNITY RULES & REGULATIONS',
        article: 'Article I: General Provisions',
        sections: [
          {
            heading: 'Section 1: Purpose',
            text: 'The purpose of these rules and regulations is to maintain the quality, character, and property values of the Magic Views Homeowners Association community. These rules are established to promote harmonious living and to protect the rights and interests of all homeowners.'
          },
          {
            heading: 'Section 2: Applicability',
            text: 'These rules apply to all homeowners, residents, tenants, and guests within the Magic Views community. All residents are responsible for ensuring that their guests comply with these rules and regulations during any visit to the community.'
          },
          {
            heading: 'Section 3: Common Areas',
            text: 'Common areas are to be used for their intended purposes only. Residents are expected to treat all common areas with respect and to leave them in the condition they were found. Damage to common areas caused by a resident or their guests will be charged to that resident\'s account.'
          },
          {
            heading: 'Section 4: Exterior Modifications',
            text: 'No exterior modifications, additions, or alterations may be made to any property without prior written approval from the Architectural Control Committee (ACC). This includes but is not limited to fencing, landscaping changes, exterior paint colors, and structural additions.'
          },
          {
            heading: 'Section 5: Enforcement',
            text: 'Violations of these rules will be handled in accordance with the association\'s enforcement policy. Homeowners will receive written notice of any violation and will be given a reasonable opportunity to cure the violation before fines are assessed.'
          }
        ]
      }
    };

    // Load consent data from URL param
    var params = new URLSearchParams(window.location.search);
    var type = params.get('type') || 'pet-policy';
    var data = CONSENTS[type] || CONSENTS['pet-policy'];

    document.getElementById('sheetTitle').textContent = 'Sign Consent';
    document.getElementById('consentTitle').textContent = data.title;
    document.getElementById('consentArticle').textContent = data.article;
    document.getElementById('consentEmail').value = window.CincAuth.getUserEmail();

    // Build document text
    var textEl = document.getElementById('consentText');
    data.sections.forEach(function (s) {
      var h = document.createElement('p');
      h.className = 'consent-doc-section-heading';
      h.textContent = s.heading;
      var p = document.createElement('p');
      p.className = 'consent-doc-section-text';
      p.textContent = s.text;
      textEl.appendChild(h);
      textEl.appendChild(p);
    });

    // Signature canvas
    var canvas = document.getElementById('sigCanvas');
    var ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#082818';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    var drawing = false;
    var hasSig = false;

    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var src = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * (canvas.width / rect.width),
        y: (src.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function checkReady() {
      var toggled = document.getElementById('consentCheck').checked;
      document.getElementById('submitBtn').disabled = !(hasSig && toggled);
    }

    canvas.addEventListener('mousedown', function (e) {
      drawing = true;
      var p = getPos(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    });
    canvas.addEventListener('mousemove', function (e) {
      if (!drawing) return;
      var p = getPos(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      hasSig = true;
      checkReady();
    });
    canvas.addEventListener('mouseup', function () { drawing = false; });
    canvas.addEventListener('mouseleave', function () { drawing = false; });

    canvas.addEventListener('touchstart', function (e) {
      e.preventDefault();
      drawing = true;
      var p = getPos(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }, { passive: false });
    canvas.addEventListener('touchmove', function (e) {
      e.preventDefault();
      if (!drawing) return;
      var p = getPos(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      hasSig = true;
      checkReady();
    }, { passive: false });
    canvas.addEventListener('touchend', function () { drawing = false; });

    document.getElementById('sigClear').addEventListener('click', function () {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hasSig = false;
      checkReady();
    });

    // Toggle
    document.getElementById('consentCheck').addEventListener('change', checkReady);

    // Submit
    document.getElementById('submitBtn').addEventListener('click', function () {
      window.location.href = 'consent-submitted.html';
    });
  </script>
</body>
</html>
