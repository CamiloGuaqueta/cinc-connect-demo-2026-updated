  <script src="scripts/auth.js"></script>
  <script src="scripts/app-dialogs.js"></script>
  <script>
    // If already logged in & not idle, skip to feed
    window.CincAuth.bootstrapLoginPage();

    // Biometric (visual only — explains it works in the real app)
    document.querySelector('[data-biometric]')?.addEventListener('click', async () => {
      await window.AppDialog.alert({
        title: 'Biometric Sign-In',
        message: 'Fingerprint and Face ID work in the published CINC Connect app. For this demo preview, please enter your name and email above.',
        confirmLabel: 'Got it'
      });
    });

    // Force lowercase on email field as the user types
    document.querySelectorAll('[data-force-lowercase]').forEach((el) => {
      el.addEventListener('input', () => {
        const pos = el.selectionStart;
        const lower = el.value.toLowerCase();
        if (el.value !== lower) {
          el.value = lower;
          try { el.setSelectionRange(pos, pos); } catch (_) {}
        }
      });
    });

    const form = document.querySelector('[data-login-form]');
    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function setFieldError(fieldName, message) {
      const wrap = form.querySelector(`[data-field-wrap="${fieldName}"]`);
      const errorEl = form.querySelector(`[data-error-for="${fieldName}"]`);
      if (message) {
        wrap?.classList.add('input-group--error');
        if (errorEl) {
          errorEl.textContent = message;
          errorEl.hidden = false;
        }
      } else {
        wrap?.classList.remove('input-group--error');
        if (errorEl) errorEl.hidden = true;
      }
    }

    // Clear a field's error as soon as the user starts typing
    form.querySelectorAll('input').forEach((input) => {
      input.addEventListener('input', () => setFieldError(input.name, null));
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const name = String(data.get('name') || '').trim();
      const email = String(data.get('email') || '').trim();

      let firstInvalid = null;
      if (!name) {
        setFieldError('name', 'Required');
        if (!firstInvalid) firstInvalid = 'name';
      } else {
        setFieldError('name', null);
      }
      if (!email) {
        setFieldError('email', 'Required');
        if (!firstInvalid) firstInvalid = 'email';
      } else if (!EMAIL_RE.test(email)) {
        setFieldError('email', 'Invalid email');
        if (!firstInvalid) firstInvalid = 'email';
      } else {
        setFieldError('email', null);
      }

      if (firstInvalid) {
        form.querySelector(`input[name="${firstInvalid}"]`).focus();
        return;
      }

      window.CincAuth.login(name, email);

      // POST to HubSpot silently — fire and forget, never blocks the user
      fetch('https://api.hsforms.com/submissions/v3/integration/submit/40040627/8db41f58-fc0f-4dfd-93d5-00eafc633dec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fields: [
            { name: 'firstname', value: name },
            { name: 'email',     value: email }
          ],
          context: {
            pageUri: window.location.href,
            pageName: 'CINC Connect Demo — CAI 2026'
          }
        })
      }).catch(function () {}); // Silently ignore network errors

      window.location.href = 'feed.html';
    });
  </script>
