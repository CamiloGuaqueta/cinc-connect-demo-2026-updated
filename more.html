<!DOCTYPE html>
<html lang="en">

        <div class="more__avatar-wrap">

        </div>

        <p class="more__email" data-user-email></p>
      </header>

      <!-- Main menu card -->

        <a class="more__row more__row--hoa" href="brand-select.html">

          <div class="more__row-text">
            <div class="more__row-title more__row-title--lime">Magic Views HOA</div>
            <div class="more__row-subtitle">Add or Switch association</div>
          </div>
          <span class="more__row-chevron" aria-hidden="true"></span>
        </a>
        <div class="more__divider"></div>

        <a class="more__row" href="chat-detail.html?id=cephai">
          <img class="more__row-icon" src="assets/icons/icon-cephai-diamond.svg" alt="" />

          <span class="more__row-chevron" aria-hidden="true"></span>
        </a>
        <div class="more__divider"></div>

        <button class="more__row" type="button">
          <img class="more__row-icon" src="assets/icons/icon-more-documents.svg" alt="" />
          <span class="more__row-title">Documents</span>
          <span class="more__row-chevron" aria-hidden="true"></span>
        </button>
        <div class="more__divider"></div>

        <button class="more__row" type="button">
          <img class="more__row-icon" src="assets/icons/icon-more-groups.svg" alt="" />
          <span class="more__row-title">Groups</span>
          <span class="more__row-chevron" aria-hidden="true"></span>
        </button>
        <div class="more__divider"></div>

        <a class="more__row" href="pets.html">
          <img class="more__row-icon" src="assets/icons/icon-more-animals.svg" alt="" />
          <span class="more__row-title">Animals</span>
          <span class="more__row-chevron" aria-hidden="true"></span>
        </a>
        <!-- Voting hidden temporarily
        <div class="more__divider"></div>
        <a class="more__row" href="voting.html">
          <span class="more__row-icon more__row-icon--inline" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 4h10l4 4v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z" stroke="#b2de61" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M9 13l2.2 2.2L16 10" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15 4v4h4" stroke="#b2de61" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="more__row-title">Voting</span>
          <span class="more__row-chevron" aria-hidden="true"></span>
        </a>
        -->
      </section>

      <!-- Custom tiles card -->
      <section class="more__card">
        <button class="more__row" type="button">
          <span class="more__row-icon more__row-icon--box" aria-hidden="true"></span>
          <span class="more__row-title">Custom Tile 1</span>
          <span class="more__row-chevron" aria-hidden="true"></span>
        </button>
        <div class="more__divider"></div>
        <button class="more__row" type="button">
          <span class="more__row-icon more__row-icon--box" aria-hidden="true"></span>
          <span class="more__row-title">Custom Tile 2</span>
          <span class="more__row-chevron" aria-hidden="true"></span>
        </button>
        <div class="more__divider"></div>
        <button class="more__row" type="button">
          <span class="more__row-icon more__row-icon--box" aria-hidden="true"></span>
          <span class="more__row-title">Custom Tile 3</span>
          <span class="more__row-chevron" aria-hidden="true"></span>
        </button>
        <div class="more__divider"></div>
        <button class="more__row" type="button">

      <!-- Settings card -->

        <button class="more__row" type="button" id="switchBrandBtn">

          <div class="more__row-text">
            <span class="more__row-title">Switch app version</span>

      <button class="more__logout" type="button" data-logout-btn>Log out</button>
      <button class="more__reset" type="button" data-reset-btn>Reset demo experience</button>

    <!-- Bottom Navigation (Menu/More active) -->
    <nav class="bottom-nav" aria-label="Main navigation">

      <a class="bottom-nav__item" href="concierge.html" aria-label="Concierge">

        </span>
        <span class="bottom-nav__label">Concierge</span>
      </a>
      <a class="bottom-nav__item" href="pinboard.html" aria-label="PinBoard">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-4-pinboard.svg" alt="" />
        </span>
        <span class="bottom-nav__label">PinBoard</span>
      </a>
      <a class="bottom-nav__item" href="financial.html" aria-label="Financial">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-5-financial.svg" alt="" />
        </span>
        <span class="bottom-nav__label">Financial</span>
      </a>
      <a class="bottom-nav__item" href="messages.html" aria-label="Chat">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-6-messages.svg" alt="" />
        </span>
        <span class="bottom-nav__label">Chat</span>
      </a>
      <a class="bottom-nav__item bottom-nav__item--active" href="more.html" aria-label="More">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-7-menu.svg" alt="" />
        </span>
        <span class="bottom-nav__label">More</span>
      </a>
    </nav>

  </div>

  <script src="scripts/auth.js"></script>
  <script src="scripts/app-dialogs.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    (function () {
      if (!window.CincAuth.requireAuth()) return;
      document.querySelector('[data-user-name]').textContent = window.CincAuth.getUserName() || 'Demo User';
      document.querySelector('[data-user-email]').textContent = window.CincAuth.getUserEmail() || '';
      var brand = window.CincAuth.getBrand();
      document.getElementById('currentBrandLabel').textContent =
        brand === 'custom' ? 'Currently: Lakewood Ridge HOA' : 'Currently: CINC Connect';
      if (brand === 'custom') {
        var hoaTitle = document.querySelector('.more__row-title--lime');
        if (hoaTitle) hoaTitle.textContent = 'Lakewood Ridge HOA';
      }
      document.getElementById('switchBrandBtn').addEventListener('click', function () {
        window.location.href = 'brand-select.html';
      });

      document.querySelector('[data-logout-btn]').addEventListener('click', async () => {
        const ok = await window.AppDialog.confirm({
          title: 'Log out',
          message: 'You\'ll need to sign in again to continue the demo.',
          confirmLabel: 'Log out',
          cancelLabel: 'Stay'
        });
        if (ok) window.CincAuth.logout();
      });
      document.querySelector('[data-reset-btn]').addEventListener('click', async () => {
        const ok = await window.AppDialog.confirm({
          title: 'Reset demo experience?',
          message: 'All your posts, likes, comments and pet registrations will be wiped.',
          confirmLabel: 'Reset',
          cancelLabel: 'Cancel',
          danger: true
        });
        if (ok) {
          window.CincAuth.wipeDemoState();
          window.location.reload();
        }
      });
    })();
  </script>
</body>
</html>
