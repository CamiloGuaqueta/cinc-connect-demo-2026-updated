<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Filter My Violations</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=2" />
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen" style="height:100dvh;overflow:hidden;">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <header class="pay-sheet__header">
          <a class="pay-sheet__back" href="my-violations.html" aria-label="Back">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
              <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <span class="pay-sheet__title">Filter My Violations</span>
          <a class="pay-sheet__close" href="my-violations.html">Reset</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <div class="pay-sheet__body">

          <!-- Unit / Account -->
          <p class="filter-section__title">Unit / Account</p>
          <div class="filter-group">
            <div class="filter-row">
              <span class="filter-radio filter-radio--selected"></span>
              <span class="filter-row__label">All Units</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">180 Crandon Blvd <span style="color:#b2de61;font-size:11px;margin-left:6px;">ACC#: 12345</span></span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">183 Very long fellow tree road <span style="color:#b2de61;font-size:11px;margin-left:6px;">ACC#: 6789</span></span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">250 Mashtha Ave <span style="color:#b2de61;font-size:11px;margin-left:6px;">ACC#: 101112</span></span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">325 Carmen Street <span style="color:#b2de61;font-size:11px;margin-left:6px;">ACC#: 161718</span></span>
            </div>
          </div>

          <!-- Violation Status -->
          <p class="filter-section__title">Violation Status</p>
          <div class="filter-group">
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">All</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio filter-radio--selected"></span>
              <span class="filter-row__label">Open</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Closed</span>
            </div>
          </div>

          <!-- Date Range -->
          <p class="filter-section__title">Date Range</p>
          <div class="filter-group">
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Last 7 days</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Last 30 days</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Last 90 days</span>
            </div>
            <div class="filter-row">
              <span class="filter-radio"></span>
              <span class="filter-row__label">Custom</span>
            </div>
          </div>

        </div><!-- /.pay-sheet__body -->

        <div class="pay-sheet__footer">
          <a class="pay-continue" href="my-violations.html">Apply Filter</a>
        </div>

      </div><!-- /.pay-sheet -->
    </div><!-- /.pay-screen -->
  </div><!-- /.app-frame -->

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
  <script>
    (function () {
      document.querySelectorAll('.filter-group').forEach(function (group) {
        group.querySelectorAll('.filter-row').forEach(function (row) {
          row.addEventListener('click', function () {
            var radio = row.querySelector('.filter-radio');
            if (!radio) return;
            group.querySelectorAll('.filter-radio').forEach(function (r) {
              r.classList.remove('filter-radio--selected');
            });
            radio.classList.add('filter-radio--selected');
          });
        });
      });
    })();
  </script>
</body>
</html>
