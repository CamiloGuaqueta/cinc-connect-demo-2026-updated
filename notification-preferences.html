<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#235237" />
  <title>CINC Connect &#8212; Notification Preferences</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
</head>
<body>
  <div class="app-frame">
    <main class="notif-pref">

      <!-- Header: back to More, CINC logo with badge -->
      <header class="sub-header" style="margin: -20px -20px 0; width: calc(100% + 40px);">
        <a href="more.html" class="sub-header__back" aria-label="Back">
          <span class="sub-header__back-icon" aria-hidden="true"></span>
        </a>
        <div class="sub-header__center"></div>
        <a class="sub-header__right" href="notifications.html" aria-label="Notifications">
          <img class="sub-header__logo" src="assets/icons/icon-cinc-logo.svg" alt="" />
          <span class="sub-header__badge">3</span>
        </a>
      </header>

      <!-- Page title -->
      <h1 class="notif-pref__page-title">Notifications</h1>

      <!-- Email -->
      <section class="more__card">
        <div class="more__row notif-pref__row">
          <img class="more__row-icon" src="assets/icons/icon-notif-email.svg" alt="" />
          <span class="more__row-title">Email</span>
          <label class="toggle toggle--labeled" aria-label="Email notifications">
            <input class="toggle__input" type="checkbox" data-notif-pref="email" />
            <span class="toggle__switch">
              <span class="toggle__yes">Yes</span>
              <span class="toggle__no">No</span>
            </span>
          </label>
        </div>
      </section>

      <!-- SMS -->
      <section class="more__card">
        <div class="more__row notif-pref__row">
          <img class="more__row-icon" src="assets/icons/icon-sms.svg" alt="" />
          <span class="more__row-title">SMS</span>
          <label class="toggle toggle--labeled" aria-label="SMS notifications">
            <input class="toggle__input" type="checkbox" data-notif-pref="sms" />
            <span class="toggle__switch">
              <span class="toggle__yes">Yes</span>
              <span class="toggle__no">No</span>
            </span>
          </label>
        </div>
      </section>

    </main>

    <!-- Bottom Navigation (More active) -->
    <nav class="bottom-nav" aria-label="Main navigation">
      <a class="bottom-nav__item" href="feed.html" aria-label="Feed">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-1-feed.svg" alt="" />
        </span>
        <span class="bottom-nav__label">Feed</span>
      </a>
      <a class="bottom-nav__item" href="todos.html" aria-label="My To-Dos">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-2-todos.svg" alt="" />
          <span class="bottom-nav__nav-badge">3</span>
        </span>
        <span class="bottom-nav__label">My To-Dos</span>
      </a>
      <a class="bottom-nav__item" href="concierge.html" aria-label="Concierge">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-3-concierge.svg" alt="" />
        </span>
        <span class="bottom-nav__label">Concierge</span>
      </a>
      <a class="bottom-nav__item" href="pinboard.html" aria-label="PinBoard">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-4-pinboard.svg" alt="" />
        </span>
        <span class="bottom-nav__label">PinBoard</span>
      </a>
      <a class="bottom-nav__item" href="financial.html" aria-label="Financial">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-5-financial.svg" alt="" />
        </span>
        <span class="bottom-nav__label">Financial</span>
      </a>
      <a class="bottom-nav__item" href="messages.html" aria-label="Chat">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-6-messages.svg" alt="" />
        </span>
        <span class="bottom-nav__label">Chat</span>
      </a>
      <a class="bottom-nav__item bottom-nav__item--active" href="more.html" aria-label="More">
        <span class="bottom-nav__icon-wrap">
          <img src="assets/icons/nav-7-menu.svg" alt="" />
        </span>
        <span class="bottom-nav__label">More</span>
      </a>
    </nav>
  </div>

  <script src="scripts/auth.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    (function () {
      if (!window.CincAuth.requireAuth()) return;

      const PREF_KEY = window.CincAuth.NS + 'notif-prefs';

      // Load saved prefs (default: both on)
      let prefs = { email: true, sms: true };
      try {
        const saved = JSON.parse(localStorage.getItem(PREF_KEY) || 'null');
        if (saved) prefs = saved;
      } catch (_) {}

      // Apply to checkboxes
      document.querySelectorAll('[data-notif-pref]').forEach(function (input) {
        const key = input.getAttribute('data-notif-pref');
        input.checked = !!prefs[key];

        input.addEventListener('change', function () {
          prefs[key] = input.checked;
          localStorage.setItem(PREF_KEY, JSON.stringify(prefs));
        });
      });
    })();
  </script>
</body>
</html>
