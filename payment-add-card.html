<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Add Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=3" />
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <!-- Header -->
        <header class="pay-sheet__header">
          <span class="pay-sheet__back" aria-hidden="true"></span>
          <span class="pay-sheet__title">Add Debit or Credit Card</span>
          <a class="pay-sheet__close" href="financial.html">Close</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <!-- Body -->
        <div class="pay-sheet__body">

          <!-- Card nickname -->
          <div class="pay-input">
            <input class="pay-input__field" type="text" placeholder="Card NickName (Optional)" autocomplete="off" />
          </div>

          <!-- Card number row -->
          <div class="pay-input pay-input--card">
            <!-- Card icon -->
            <svg class="pay-input__card-icon" viewBox="0 0 16 11" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="0.5" y="0.5" width="15" height="10" rx="1.5" fill="none" stroke="rgba(255,248,234,0.4)"/>
              <rect x="0" y="3" width="16" height="3" fill="rgba(255,248,234,0.25)"/>
              <rect x="2" y="7.5" width="5" height="1.5" rx="0.75" fill="rgba(255,248,234,0.3)"/>
            </svg>
            <input class="pay-input__field pay-input__field--num" type="tel" inputmode="numeric" placeholder="1234" maxlength="19" />
            <div class="pay-input__vdivider"></div>
            <input class="pay-input__field pay-input__field--exp" type="tel" inputmode="numeric" placeholder="mm/yy" maxlength="5" />
            <div class="pay-input__vdivider"></div>
            <input class="pay-input__field pay-input__field--cvc" type="tel" inputmode="numeric" placeholder="cvc" maxlength="4" />
          </div>

          <!-- Address -->
          <div class="pay-input">
            <input class="pay-input__field" type="text" placeholder="Address" autocomplete="street-address" />
          </div>

          <!-- Address 2 -->
          <div class="pay-input">
            <input class="pay-input__field" type="text" placeholder="Address 2 (Unit, Apt, Etc)" autocomplete="address-line2" />
          </div>

          <!-- State -->
          <div class="pay-input">
            <input class="pay-input__field" type="text" placeholder="State" autocomplete="address-level1" maxlength="2" />
          </div>

          <!-- Zipcode -->
          <div class="pay-input">
            <input class="pay-input__field" type="tel" inputmode="numeric" placeholder="Zipcode" autocomplete="postal-code" maxlength="10" />
          </div>

        </div><!-- /.pay-sheet__body -->

        <!-- Footer -->
        <div class="pay-sheet__footer">
          <a class="pay-continue" href="payment-methods.html">Add Credit Card</a>
        </div>

      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
