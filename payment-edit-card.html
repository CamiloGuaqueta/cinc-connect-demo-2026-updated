<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Edit Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css" />
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <!-- Header — no back arrow per design -->
        <header class="pay-sheet__header">
          <span class="pay-sheet__back" aria-hidden="true"></span>
          <span class="pay-sheet__title">Make Payment</span>
          <a class="pay-sheet__close" href="financial.html">Close</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <!-- Body -->
        <div class="pay-sheet__body">

          <p class="pay-section__title">Edit Credit Card</p>

          <!-- Card nickname (pre-filled) -->
          <div class="pay-field-card">
            <div class="pay-field">
              <span class="pay-field__label">Nickname</span>
              <input
                class="pay-field__input"
                type="text"
                value="Personal CC Chase"
                autocomplete="off"
                readonly
              />
              <button class="pay-field__edit" type="button" aria-label="Edit nickname">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M11.5 2.5a1.414 1.414 0 0 1 2 2L5 13H3v-2L11.5 2.5Z" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Card details row (pre-filled, masked) -->
          <div class="pay-field-card">
            <div class="pay-field pay-field--card-row">
              <!-- Visa icon -->
              <svg class="pay-field__card-icon" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="0.5" y="0.5" width="27" height="19" rx="3.5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
                <text x="4" y="14" font-family="Montserrat,sans-serif" font-size="7" font-weight="700" fill="rgba(255,255,255,0.6)">VISA</text>
              </svg>
              <input
                class="pay-field__input pay-field__input--num"
                type="text"
                value="**** ****** *2564"
                readonly
              />
              <div class="pay-field__divider"></div>
              <input
                class="pay-field__input pay-field__input--exp"
                type="text"
                value="02/28"
                readonly
              />
              <div class="pay-field__divider"></div>
              <input
                class="pay-field__input pay-field__input--cvc"
                type="text"
                value="356"
                readonly
              />
              <button class="pay-field__edit" type="button" aria-label="Edit card">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M11.5 2.5a1.414 1.414 0 0 1 2 2L5 13H3v-2L11.5 2.5Z" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Billing address (pre-filled) -->
          <div class="pay-field-card">
            <div class="pay-field">
              <span class="pay-field__label">Address</span>
              <input
                class="pay-field__input"
                type="text"
                value="180 Crandon Blvd"
                readonly
              />
              <button class="pay-field__edit" type="button" aria-label="Edit address">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M11.5 2.5a1.414 1.414 0 0 1 2 2L5 13H3v-2L11.5 2.5Z" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
            <div class="pay-field">
              <span class="pay-field__label">Address 2</span>
              <input
                class="pay-field__input"
                type="text"
                placeholder="Apt, suite, etc. (optional)"
                readonly
              />
            </div>
            <div class="pay-field">
              <span class="pay-field__label">State</span>
              <input
                class="pay-field__input"
                type="text"
                value="FL"
                readonly
              />
              <button class="pay-field__edit" type="button" aria-label="Edit state">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M11.5 2.5a1.414 1.414 0 0 1 2 2L5 13H3v-2L11.5 2.5Z" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
            <div class="pay-field">
              <span class="pay-field__label">Zip Code</span>
              <input
                class="pay-field__input"
                type="text"
                value="33138"
                readonly
              />
              <button class="pay-field__edit" type="button" aria-label="Edit zip">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M11.5 2.5a1.414 1.414 0 0 1 2 2L5 13H3v-2L11.5 2.5Z" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>

        </div><!-- /.pay-sheet__body -->

        <!-- Footer — stacked: Remove (red) + Save (lime) -->
        <div class="pay-sheet__footer pay-sheet__footer--stack">
          <a class="pay-btn--danger" href="payment-remove-card.html">Remove Credit Card</a>
          <a class="pay-continue" href="payment-updated.html">Save</a>
        </div>

      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
