<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Edit Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css" />
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <!-- Header -->
        <header class="pay-sheet__header">
          <span class="pay-sheet__back" aria-hidden="true"></span>
          <span class="pay-sheet__title">Edit Credit Card</span>
          <a class="pay-sheet__close" href="financial.html">Close</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <!-- Body -->
        <div class="pay-sheet__body">

          <!-- Card nickname (pre-filled + edit icon) -->
          <div class="pay-input">
            <input class="pay-input__field" type="text" value="Personal CC Chase" autocomplete="off" readonly />
            <!-- Edit icon: lime circle with pencil -->
            <svg class="pay-input__edit" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="7.5" cy="7.5" r="7.5" fill="#b2de61"/>
              <path d="M4.5 7.5L6.5 9.5L10.5 5.5" stroke="#235237" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- Card number row (pre-filled + edit icon) -->
          <div class="pay-input pay-input--card">
            <input class="pay-input__field pay-input__field--num" type="text" value="**** ****** *2564" readonly />
            <div class="pay-input__vdivider"></div>
            <input class="pay-input__field pay-input__field--exp" type="text" value="02/28" readonly />
            <div class="pay-input__vdivider"></div>
            <input class="pay-input__field pay-input__field--cvc" type="text" value="356" readonly />
            <svg class="pay-input__edit" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="7.5" cy="7.5" r="7.5" fill="#b2de61"/>
              <path d="M4.5 7.5L6.5 9.5L10.5 5.5" stroke="#235237" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- Address (pre-filled + edit icon) -->
          <div class="pay-input">
            <input class="pay-input__field" type="text" value="180 Crandon Blvd" readonly />
            <svg class="pay-input__edit" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="7.5" cy="7.5" r="7.5" fill="#b2de61"/>
              <path d="M4.5 7.5L6.5 9.5L10.5 5.5" stroke="#235237" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- Address 2 (empty — no edit icon) -->
          <div class="pay-input">
            <input class="pay-input__field" type="text" placeholder="Address 2 (Unit, Apt, Etc)" readonly />
          </div>

          <!-- State (pre-filled + edit icon) -->
          <div class="pay-input">
            <input class="pay-input__field" type="text" value="FL" readonly style="text-transform:uppercase;" />
            <svg class="pay-input__edit" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="7.5" cy="7.5" r="7.5" fill="#b2de61"/>
              <path d="M4.5 7.5L6.5 9.5L10.5 5.5" stroke="#235237" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- Zipcode (pre-filled + edit icon) -->
          <div class="pay-input">
            <input class="pay-input__field" type="text" value="33138" readonly />
            <svg class="pay-input__edit" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="7.5" cy="7.5" r="7.5" fill="#b2de61"/>
              <path d="M4.5 7.5L6.5 9.5L10.5 5.5" stroke="#235237" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

        </div><!-- /.pay-sheet__body -->

        <!-- Footer — Remove (coral) on top, Save (lime) below -->
        <div class="pay-sheet__footer pay-sheet__footer--stack">
          <a class="pay-btn--danger" href="payment-remove-card.html">Remove Credit Card</a>
          <a class="pay-continue" href="payment-updated.html">Save</a>
        </div>

      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
