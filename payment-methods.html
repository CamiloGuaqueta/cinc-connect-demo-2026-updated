<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect &#8212; Payment Methods</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>try{if(localStorage.getItem('cinc:demo:brand')==='custom')document.documentElement.setAttribute('data-brand','custom');}catch(_){}</script>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    .pay-tool-row.is-selected {
      background: rgba(178, 222, 97, 0.12);
    }
    html[data-brand="custom"] .pay-tool-row.is-selected {
      background: rgba(0, 41, 122, 0.08);
    }
    .pay-tool-row__chev--check {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pay-tool-row__chev--check svg {
      display: block;
    }
  </style>
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <!-- Header -->
        <header class="pay-sheet__header">
          <a class="pay-sheet__back" href="javascript:history.back()" aria-label="Back">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
              <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <span class="pay-sheet__title">Payment Methods</span>
          <a class="pay-sheet__close" href="financial.html">Close</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <!-- Body -->
        <div class="pay-sheet__body">

          <p class="pay-section__title">Saved Methods</p>

          <!-- Saved methods list -->
          <div class="pay-tool-card">
            <button class="pay-tool-row pay-method-row" type="button">
              <img class="pay-tool-row__icon" src="assets/icons/icon-tile-payment-methods.svg" alt="" />
              <div style="flex:1; min-width:0;">
                <div class="pay-tool-row__label">Visa - 2564</div>
                <div class="pay-tool-row__sub" style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; font-family:Montserrat,sans-serif;">Credit Card Business</div>
              </div>
              <span class="pay-tool-row__chev" aria-hidden="true"></span>
            </button>
            <div class="pay-option-divider"></div>
            <button class="pay-tool-row pay-method-row" type="button">
              <img class="pay-tool-row__icon" src="assets/icons/icon-tile-payment-methods.svg" alt="" />
              <div style="flex:1; min-width:0;">
                <div class="pay-tool-row__label">Bank Account 1 - 5695</div>
                <div class="pay-tool-row__sub" style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; font-family:Montserrat,sans-serif;">Checking BOA</div>
              </div>
              <span class="pay-tool-row__chev" aria-hidden="true"></span>
            </button>
            <div class="pay-option-divider"></div>
            <button class="pay-tool-row pay-method-row" type="button">
              <img class="pay-tool-row__icon" src="assets/icons/icon-tile-payment-methods.svg" alt="" />
              <div style="flex:1; min-width:0;">
                <div class="pay-tool-row__label">Bank Account 2 - 8698</div>
                <div class="pay-tool-row__sub" style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; font-family:Montserrat,sans-serif;">Join Bank Account Checking</div>
              </div>
              <span class="pay-tool-row__chev" aria-hidden="true"></span>
            </button>
            <div class="pay-option-divider"></div>
            <button class="pay-tool-row pay-method-row" type="button">
              <img src="assets/icons/icon-apple-pay.svg" alt="Apple Pay" width="40" height="25" style="flex-shrink:0; margin-right:4px;" />
              <div style="flex:1; min-width:0;">
                <div class="pay-tool-row__label">Apple Pay</div>
                <div class="pay-tool-row__sub" style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; font-family:Montserrat,sans-serif;">Amex, Discover, Mastercard, Visa</div>
              </div>
              <span class="pay-tool-row__chev" aria-hidden="true"></span>
            </button>
            <div class="pay-option-divider"></div>
            <button class="pay-tool-row pay-method-row" type="button">
              <img src="assets/icons/icon-google-pay.svg" alt="Google Pay" width="46" height="25" style="flex-shrink:0; margin-right:4px;" />
              <div style="flex:1; min-width:0;">
                <div class="pay-tool-row__label">Google Pay</div>
                <div class="pay-tool-row__sub" style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; font-family:Montserrat,sans-serif;">Amex, Discover, Mastercard, Visa</div>
              </div>
              <span class="pay-tool-row__chev" aria-hidden="true"></span>
            </button>
          </div>

        </div><!-- /.pay-sheet__body -->

        <!-- Footer -->
        <div class="pay-sheet__footer">
          <a class="pay-continue" href="payment-add-card.html">Add Payment Method</a>
        </div>

      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
  <script>
    (function () {
      var isCustom = document.documentElement.getAttribute('data-brand') === 'custom';
      var checkSvg = isCustom
        ? '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8.5" fill="#00297a"/><path d="M5 9l3 3 5-5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8.5" fill="#b2de61"/><path d="M5 9l3 3 5-5" stroke="#235237" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      document.querySelectorAll('.pay-method-row').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var chev = btn.querySelector('.pay-tool-row__chev');
          btn.classList.add('is-selected');
          if (chev) {
            chev.className = 'pay-tool-row__chev--check';
            chev.innerHTML = checkSvg;
          }
          setTimeout(function () { history.back(); }, 800);
        });
      });
    })();
  </script>
</body>
</html>
