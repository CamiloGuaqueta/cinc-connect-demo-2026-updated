<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect � Remove Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <!-- Header -->
        <header class="pay-sheet__header">
          <a class="pay-sheet__back" href="payment-edit-card.html" aria-label="Back">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
              <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <span class="pay-sheet__title">Remove Credit Card</span>
          <a class="pay-sheet__close" href="financial.html">Close</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <!-- Body -->
        <div class="pay-sheet__body">

          <!-- Warning hero -->
          <div class="pay-warning">
            <!-- Red circle with "!" � solid fill matching Figma -->
            <div class="pay-warning__icon" aria-hidden="true">
              <svg width="40" height="50" viewBox="0 0 40 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="50%" y="38" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="44" font-weight="800" fill="white">!</text>
              </svg>
            </div>
            <h2 class="pay-warning__title">Remove Credit Card?</h2>
            <p class="pay-warning__text">Are you sure you want to remove the Credit Card ending in ****2564 from your payment methods? This action can't be undone.</p>
          </div>

        </div><!-- /.pay-sheet__body -->

        <!-- Footer -->
        <div class="pay-sheet__footer">
          <a class="pay-btn--danger" href="payment-removed.html">Remove</a>
        </div>

      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
