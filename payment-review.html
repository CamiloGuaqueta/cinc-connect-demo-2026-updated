<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — Review Payment</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css" />
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <!-- Header -->
        <header class="pay-sheet__header">
          <a class="pay-sheet__back" href="payment-method.html" aria-label="Back">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
              <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <span class="pay-sheet__title">Make Payment</span>
          <a class="pay-sheet__close" href="financial.html">Close</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <!-- Body -->
        <div class="pay-sheet__body">

          <p class="pay-section__title">Review Payment Details</p>

          <!-- Amount breakdown card -->
          <div class="pay-review-card">
            <div class="pay-review-row">
              <div class="pay-review-row__info">
                <span class="pay-review-row__label">Amount</span>
                <span class="pay-review-row__sub">Total Balance</span>
              </div>
              <span class="pay-review-row__value">$1,500.97</span>
            </div>
            <div class="pay-option-divider"></div>
            <div class="pay-review-row">
              <div class="pay-review-row__info">
                <span class="pay-review-row__label">Processing Fee</span>
                <span class="pay-review-row__sub">Credit Card 4%</span>
              </div>
              <span class="pay-review-row__value">$60.00</span>
            </div>
            <div class="pay-option-divider"></div>
            <div class="pay-review-row">
              <span class="pay-review-row__label">Total</span>
              <span class="pay-review-row__value pay-review-row__value--total">$1,560.97</span>
            </div>
          </div>

          <!-- Date -->
          <div class="pay-info-card">
            <span class="pay-info-card__label">Date</span>
            <span class="pay-info-card__value">Wednesday, May 14, 2026</span>
          </div>

          <!-- Payment Method -->
          <div class="pay-info-card">
            <span class="pay-info-card__label">Payment Method</span>
            <span class="pay-info-card__value">Bank Account 1 - 5695 - Checking BOA</span>
          </div>

        </div><!-- /.pay-sheet__body -->

        <!-- Footer -->
        <div class="pay-sheet__footer">
          <a class="pay-continue" href="payment-submitted.html">Submit Payment</a>
        </div>

      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
