<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect � Card Updated</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>try{if(localStorage.getItem('cinc:demo:brand')==='custom')document.documentElement.setAttribute('data-brand','custom');}catch(_){}</script>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <!-- Header � no back on success screen -->
        <header class="pay-sheet__header">
          <span class="pay-sheet__back" aria-hidden="true"></span>
          <span class="pay-sheet__title">Card</span>
          <a class="pay-sheet__close" href="financial.html">Close</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <!-- Body -->
        <div class="pay-sheet__body">

          <!-- Success hero -->
          <div class="pay-success">
            <div class="pay-success__icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 32 32" fill="none">
                <path d="M27.2814 1.16417C20.2509 6.09796 13.7981 17.7893 10.8589 23.6715L4.86622 15.5739C4.11679 14.5616 2.68824 14.3471 1.67409 15.0974C0.66176 15.8468 0.448177 17.2754 1.1976 18.2896L9.44857 29.4387C9.88125 30.0229 10.5649 30.3625 11.2833 30.3625C11.3646 30.3625 11.4485 30.3579 11.5316 30.3497C12.3386 30.2603 13.0378 29.7491 13.3682 29.0079C13.4495 28.8262 21.5562 10.7579 29.9039 4.89942C30.9354 4.17556 31.1846 2.75247 30.4598 1.72008C29.7369 0.688579 28.3156 0.441215 27.2814 1.16417Z" fill="#235237" stroke="#235237" stroke-width="1.5"/>
              </svg>
            </div>
            <h2 class="pay-success__title">Credit Card Updated!</h2>
            <p class="pay-success__text">Your Visa card ending in ****2564 has been updated successfully.</p>
          </div>

        </div><!-- /.pay-sheet__body -->

        <!-- Footer -->
        <div class="pay-sheet__footer">
          <a class="pay-continue" href="payment-methods.html">Done</a>
        </div>

      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
