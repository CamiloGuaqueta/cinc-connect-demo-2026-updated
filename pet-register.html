<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect � Register Animal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
</head>
<body>
  <div class="app-frame">
    <main class="pet-register">
      <header class="sub-header">
        <a href="pets.html" class="sub-header__back" aria-label="Back">
          <span class="sub-header__back-icon" aria-hidden="true"></span>
        </a>
        <div class="sub-header__center"></div>
        <a class="sub-header__right" href="notifications.html" aria-label="Notifications">
          <img class="sub-header__logo" src="assets/icons/icon-notification-bell.svg" alt="" />
        </a>
      </header>

      <h1 class="pets__title">REGISTER ANIMAL</h1>

      <form class="pet-form" id="petRegForm" data-pet-form>
        <!-- Photo -->
        <div class="pet-form__photo">
          <div class="pet-form__avatar" data-photo-preview>
            <img class="pet-form__avatar-paw" src="assets/icons/icon-more-animals.svg" alt="" />
          </div>
          <button class="pet-form__photo-btn" type="button" data-photo-add>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span data-photo-btn-label>Add</span>
          </button>
          <input type="file" accept="image/*" hidden data-photo-file />
        </div>

        <!-- Name -->
        <label class="pet-form__field">
          <span class="pet-form__label">Name <span class="pet-form__req">*</span></span>
          <input class="pet-form__input" type="text" name="name" placeholder="Animal Name" required maxlength="40" />
        </label>

        <!-- Unit Number -->
        <label class="pet-form__field">
          <span class="pet-form__label">Unit Number <span class="pet-form__req">*</span></span>
          <select class="pet-form__select" name="unitNumber" required data-unit>
            <option value="" disabled selected>Select</option>
          </select>
        </label>

        <!-- Designation -->
        <label class="pet-form__field">
          <span class="pet-form__label">Designation <span class="pet-form__req">*</span></span>
          <select class="pet-form__select" name="designation" required data-designation>
            <option value="" disabled selected>Select</option>
          </select>
        </label>

        <!-- Type -->
        <label class="pet-form__field">
          <span class="pet-form__label">Type <span class="pet-form__req">*</span></span>
          <select class="pet-form__select" name="type" required data-type>
            <option value="" disabled selected>Select</option>
          </select>
        </label>

        <!-- Breed -->
        <label class="pet-form__field">
          <span class="pet-form__label">Breed</span>
          <select class="pet-form__select" name="breed" data-breed disabled>
            <option value="" disabled selected>Select type first</option>
          </select>
        </label>

        <!-- Color -->
        <label class="pet-form__field">
          <span class="pet-form__label">Color</span>
          <input class="pet-form__input" type="text" name="color" placeholder="e.g. Golden, Black & White" maxlength="40" />
        </label>

        <!-- Weight -->
        <label class="pet-form__field">
          <span class="pet-form__label">Weight</span>
          <input class="pet-form__input" type="text" name="weight" placeholder="e.g. 65 lbs" maxlength="20" />
        </label>

        <!-- Microchip Number -->
        <label class="pet-form__field">
          <span class="pet-form__label">Microchip Number</span>
          <input class="pet-form__input" type="text" name="microchipNumber" placeholder="985 112 003 456 789" maxlength="20" />
        </label>

        <!-- Birthday -->
        <div class="pet-form__field">
          <span class="pet-form__label">Birthday</span>
          <button class="pet-form__date-trigger" type="button" data-date-trigger="birthday">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span data-date-display="birthday">Select date</span>
          </button>
        </div>

        <!-- Vaccines Date -->
        <div class="pet-form__field">
          <span class="pet-form__label">Vaccines Date</span>
          <button class="pet-form__date-trigger" type="button" data-date-trigger="vaccineDate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span data-date-display="vaccineDate">Select date</span>
          </button>
        </div>

        <!-- Vaccines Expiration -->
        <div class="pet-form__field">
          <span class="pet-form__label">Vaccines Expiration</span>
          <button class="pet-form__date-trigger" type="button" data-date-trigger="vaccineExpiration">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span data-date-display="vaccineExpiration">Select date</span>
          </button>
        </div>

        <!-- Vaccines document (display only � upload available in full app) -->
        <button class="pet-form__doc-btn" type="button" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
          <span>Add Vaccines Document</span>
        </button>

        <!-- Notes -->
        <label class="pet-form__field">
          <span class="pet-form__label">Comments / Notes</span>
          <textarea class="pet-form__textarea" name="notes" placeholder="Anything we should know about your pet?" maxlength="300" rows="3"></textarea>
        </label>

      </form>
    </main>

    <!-- Sticky footer -->
    <div class="pet-register-footer">
      <button class="btn btn--primary" type="submit" form="petRegForm">SUBMIT REGISTRATION</button>
    </div>

    <!-- Custom select picker modal -->
    <div class="modal-backdrop modal-backdrop--center" id="customSelectModal" hidden>
      <div class="csel-modal">
        <button class="csel-modal__close" id="customSelectClose" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="8" y1="8" x2="16" y2="16"/>
            <line x1="16" y1="8" x2="8" y2="16"/>
          </svg>
        </button>
        <h2 class="csel-modal__title" id="customSelectTitle">Select</h2>
        <div class="csel-modal__rule"></div>
        <ul class="csel-modal__list" id="customSelectList"></ul>
      </div>
    </div>

    <!-- Date picker modal (centered, same as amenity-detail) -->
    <div class="modal-backdrop modal-backdrop--center" data-date-modal hidden>
      <div class="modal-sheet date-picker">
        <header class="modal-sheet__header">
          <h2 class="modal-sheet__title">Select Date</h2>
          <button class="modal-sheet__close" type="button" data-date-close aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="6" y1="6" x2="18" y2="18"/>
              <line x1="6" y1="18" x2="18" y2="6"/>
            </svg>
          </button>
        </header>
        <div class="date-picker__body">
          <div class="cal-month__nav">
            <button class="cal-month__arrow" type="button" data-picker-prev aria-label="Previous month">
              <span class="cal-arrow cal-arrow--left" aria-hidden="true"></span>
            </button>
            <span class="cal-month__title" data-picker-title>�</span>
            <button class="cal-month__arrow" type="button" data-picker-next aria-label="Next month">
              <span class="cal-arrow" aria-hidden="true"></span>
            </button>
          </div>
          <div class="cal-month__weekdays">
            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
          </div>
          <div class="cal-month__grid" data-picker-grid></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ============================================================
       PET REGISTRATION SUCCESS SHEET (Green Sheet pattern)
       ============================================================ -->
  <div class="pet-success-backdrop" id="petSuccessBackdrop"></div>
  <div class="pet-success-sheet" id="petSuccessSheet" aria-hidden="true">
    <div class="pet-success-sheet__body">
      <div class="pet-success__icon" aria-hidden="true">
        <img src="assets/icons/icon-more-animals.svg" alt="" />
      </div>
      <h2 class="pet-success__title">Animal Registration<br>Submitted</h2>
      <p class="pet-success__text">Our management team will review your application and notify you of the approval or denial.</p>
      <a class="btn btn--primary pet-success__cta" href="pets.html">Back to My Animals</a>
    </div>
  </div>

  <!-- Pet photo gallery picker (outside app-frame so fixed overlay works) -->
  <div class="pet-gallery-sheet" id="petGallery" aria-hidden="true" style="display:none">
    <div class="pet-gallery-sheet__scrim" id="petGalleryScrim"></div>
    <div class="pet-gallery-sheet__panel" role="dialog" aria-modal="true" aria-label="Select Photo">
      <div class="pet-gallery-sheet__header">
        <button class="pet-gallery-sheet__back" id="petGalleryBack" type="button" aria-label="Back">
          <span class="sub-header__back-icon" aria-hidden="true"></span>
        </button>
        <span class="pet-gallery-sheet__title">Select Photo</span>
        <div class="pet-gallery-sheet__right"></div>
      </div>
      <div class="pet-gallery-sheet__rule"></div>
      <div class="pet-gallery-grid" id="petGalleryGrid"></div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script src="scripts/pets-state.js"></script>
  <script>
    (function () {
      if (!window.CincAuth.requireAuth()) return;

      const P = window.PetsState;

      // ----- Populate dropdowns -----
      const unitSel  = document.querySelector('[data-unit]');
      const desigSel = document.querySelector('[data-designation]');
      const typeSel  = document.querySelector('[data-type]');
      const breedSel = document.querySelector('[data-breed]');

      P.UNIT_NUMBERS.forEach((u) => {
        const opt = document.createElement('option');
        opt.value = u; opt.textContent = u;
        unitSel.appendChild(opt);
      });
      P.DESIGNATIONS.forEach((d) => {
        const opt = document.createElement('option');
        opt.value = d.value; opt.textContent = d.label;
        desigSel.appendChild(opt);
      });
      P.TYPES.forEach((t) => {
        const opt = document.createElement('option');
        opt.value = t.value; opt.textContent = t.label;
        typeSel.appendChild(opt);
      });

      typeSel.addEventListener('change', () => {
        const breeds = P.BREEDS_BY_TYPE[typeSel.value] || [];
        breedSel.innerHTML = '<option value="" disabled selected>Select</option>';
        breeds.forEach((b) => {
          const opt = document.createElement('option');
          opt.value = b; opt.textContent = b;
          breedSel.appendChild(opt);
        });
        breedSel.disabled = breeds.length === 0;
      });

      // ----- Custom Select Picker Modal -----
      const cselModal  = document.getElementById('customSelectModal');
      const cselTitle  = document.getElementById('customSelectTitle');
      const cselList   = document.getElementById('customSelectList');
      const cselClose  = document.getElementById('customSelectClose');
      let   activeSelect = null;

      function openCsel(selEl) {
        if (selEl.disabled) return;
        activeSelect = selEl;
        // Get label from parent field
        const labelEl = selEl.closest('label, .pet-form__field')?.querySelector('.pet-form__label');
        cselTitle.textContent = labelEl
          ? labelEl.textContent.replace('*', '').trim()
          : 'Select';
        // Render options (skip disabled placeholder)
        cselList.innerHTML = '';
        Array.from(selEl.options).forEach((opt) => {
          if (opt.disabled) return;
          const li = document.createElement('li');
          li.className = 'csel-modal__option' + (opt.value === selEl.value ? ' csel-modal__option--active' : '');
          li.textContent = opt.textContent;
          li.addEventListener('click', () => {
            selEl.value = opt.value;
            selEl.dispatchEvent(new Event('change', { bubbles: true }));
            // Update trigger text + color
            const tr = selEl.previousElementSibling;
            if (tr && tr.classList.contains('pet-form__select-trigger')) {
              const txt = tr.querySelector('.pet-form__select-trigger-text');
              txt.textContent = opt.textContent;
              txt.classList.add('is-filled');
            }
            closeCsel();
          });
          cselList.appendChild(li);
        });
        cselModal.hidden = false;
      }

      function closeCsel() {
        cselModal.hidden = true;
        activeSelect = null;
      }

      cselClose.addEventListener('click', closeCsel);
      cselModal.addEventListener('click', (e) => {
        if (e.target === cselModal) closeCsel();
      });

      // Update the visible text of each select after a value is chosen
      function updateSelDisplay(selEl) {
        const chosen = Array.from(selEl.options).find((o) => o.value === selEl.value);
        const trigger = selEl.previousElementSibling; // .pet-form__select-trigger if present
        if (trigger && trigger.classList.contains('pet-form__select-trigger')) {
          trigger.querySelector('.pet-form__select-trigger-text').textContent =
            chosen ? chosen.textContent : 'Select';
        }
      }

      // Intercept all pet-form selects ? open custom picker
      document.querySelectorAll('.pet-form__select').forEach((sel) => {
        // Replace native select with a visual trigger button
        const trigger = document.createElement('button');
        trigger.type = 'button';
        trigger.className = 'pet-form__select-trigger';
        trigger.innerHTML = `
          <span class="pet-form__select-trigger-text">
            ${sel.options[0]?.textContent || 'Select'}
          </span>
          <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1l5 5 5-5" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>`;
        sel.parentNode.insertBefore(trigger, sel);
        sel.style.display = 'none';

        trigger.addEventListener('click', () => openCsel(sel));

        // When select value changes externally (e.g. breed repopulated), sync trigger text
        sel.addEventListener('change', () => {
          const chosen = Array.from(sel.options).find((o) => o.value === sel.value);
          trigger.querySelector('.pet-form__select-trigger-text').textContent =
            chosen && !chosen.disabled ? chosen.textContent : (sel.options[0]?.textContent || 'Select');
          // If disabled (e.g. breed reset), reflect placeholder
          if (sel.disabled) {
            trigger.disabled = true;
            trigger.querySelector('.pet-form__select-trigger-text').textContent =
              sel.options[0]?.textContent || 'Select type first';
          } else {
            trigger.disabled = false;
          }
        });

        // Sync initial disabled state (breed starts disabled)
        if (sel.disabled) {
          trigger.disabled = true;
        }
      });

      // Re-sync breed trigger when type changes (breed gets new options + enabled)
      typeSel.addEventListener('change', () => {
        const breedTrigger = breedSel.previousElementSibling;
        if (!breedTrigger) return;
        if (breedSel.disabled) {
          breedTrigger.disabled = true;
          breedTrigger.querySelector('.pet-form__select-trigger-text').textContent = 'Select type first';
        } else {
          breedTrigger.disabled = false;
          breedTrigger.querySelector('.pet-form__select-trigger-text').textContent = 'Select';
        }
      });

      // ----- Pet gallery images -----
      const PET_GALLERY = [
        { src: 'assets/pets/Dog-GoldenRetriever.png',   label: 'Golden Retriever' },
        { src: 'assets/pets/Dog-Dalmatian.png',         label: 'Dalmatian' },
        { src: 'assets/pets/Dog-Pug.png',               label: 'Pug' },
        { src: 'assets/pets/Dog-AustralianSheepdog.png',label: 'Australian Shepherd' },
        { src: 'assets/pets/Cat-EsmereldaCalico.png',   label: 'Esmerelda Calico' },
        { src: 'assets/pets/Cat-SunshineTabby.png',     label: 'Sunshine Tabby' },
      ];

      const gallerySheet  = document.getElementById('petGallery');
      const galleryScrim  = document.getElementById('petGalleryScrim');
      const galleryBack   = document.getElementById('petGalleryBack');
      const galleryGrid   = document.getElementById('petGalleryGrid');

      // Render gallery grid
      galleryGrid.innerHTML = PET_GALLERY.map((p, i) => `
        <button class="pet-gallery-item" type="button" data-gallery-idx="${i}">
          <img class="pet-gallery-item__img" src="${p.src}" alt="${p.label}" />
          <span class="pet-gallery-item__check" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </span>
        </button>`).join('');

      function openGallery() {
        gallerySheet.style.display = 'block';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            gallerySheet.classList.add('pet-gallery-sheet--open');
            gallerySheet.removeAttribute('aria-hidden');
          });
        });
      }

      function closeGallery() {
        gallerySheet.classList.remove('pet-gallery-sheet--open');
        gallerySheet.setAttribute('aria-hidden', 'true');
        setTimeout(() => {
          if (!gallerySheet.classList.contains('pet-gallery-sheet--open')) {
            gallerySheet.style.display = 'none';
          }
        }, 380);
      }

      galleryBack.addEventListener('click', closeGallery);
      galleryScrim.addEventListener('click', closeGallery);

      // Swipe down to close
      var _galleryStartY = 0;
      gallerySheet.querySelector('.pet-gallery-sheet__panel').addEventListener('touchstart', (e) => {
        _galleryStartY = e.touches[0].clientY;
      }, { passive: true });
      gallerySheet.querySelector('.pet-gallery-sheet__panel').addEventListener('touchend', (e) => {
        if (e.changedTouches[0].clientY - _galleryStartY > 60) closeGallery();
      }, { passive: true });

      // ----- Photo state -----
      const photoFile    = document.querySelector('[data-photo-file]');
      const photoBtn     = document.querySelector('[data-photo-add]');
      const photoPreview = document.querySelector('[data-photo-preview]');
      const photoBtnLabel = document.querySelector('[data-photo-btn-label]');
      let photoData = null;

      function applyPhoto(src) {
        photoData = src;
        photoPreview.innerHTML = `<img src="${src}" alt="" class="pet-form__avatar-img" />`;
        photoBtnLabel.textContent = 'Change';
      }

      // Open gallery on Add/Change click
      photoBtn.addEventListener('click', openGallery);

      // Gallery item selected
      galleryGrid.addEventListener('click', (e) => {
        const item = e.target.closest('[data-gallery-idx]');
        if (!item) return;
        // Update selection highlight
        galleryGrid.querySelectorAll('.pet-gallery-item').forEach((el) =>
          el.classList.remove('pet-gallery-item--selected'));
        item.classList.add('pet-gallery-item--selected');
        // Apply to avatar
        const idx = Number(item.getAttribute('data-gallery-idx'));
        applyPhoto(PET_GALLERY[idx].src);
        closeGallery();
      });

      // Handle file upload (canvas resize)
      photoFile.addEventListener('change', () => {
        const file = photoFile.files && photoFile.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const MAX_W = 600;
            const scale = Math.min(1, MAX_W / img.width);
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            // Clear gallery selection since user uploaded their own
            galleryGrid.querySelectorAll('.pet-gallery-item').forEach((el) =>
              el.classList.remove('pet-gallery-item--selected'));
            applyPhoto(canvas.toDataURL('image/jpeg', 0.75));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        photoFile.value = '';
      });


      // ----- Date picker (3 fields share one modal � month + year mode) -----
      const dateModal = document.querySelector('[data-date-modal]');
      const pickerTitle = document.querySelector('[data-picker-title]');
      const pickerGrid = document.querySelector('[data-picker-grid]');
      const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const DAY_NAMES_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const today = new Date();
      let pickerCursor = new Date(today.getFullYear(), today.getMonth(), 1);
      let pickerMode = 'month';   // 'month' | 'year'
      let pickerField = null;     // 'birthday' | 'vaccineDate' | 'vaccineExpiration'
      const selectedDates = {};

      function pad(n) { return String(n).padStart(2, '0'); }
      function isSameDay(a, b) {
        return a && b &&
          a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() &&
          a.getDate() === b.getDate();
      }

      function renderPicker() {
        if (pickerMode === 'year') renderYearPicker();
        else renderMonthPicker();
      }

      function renderMonthPicker() {
        pickerGrid.classList.remove('cal-month__grid--years');
        const cur = pickerCursor;
        pickerTitle.innerHTML = `${MONTH_NAMES[cur.getMonth()]} ${cur.getFullYear()}`;
        const firstOfMonth = new Date(cur.getFullYear(), cur.getMonth(), 1);
        const lastOfMonth = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
        const startWeekday = firstOfMonth.getDay();
        const totalDays = lastOfMonth.getDate();
        const sel = pickerField && selectedDates[pickerField] ? new Date(selectedDates[pickerField]) : null;

        const cells = [];
        for (let i = 0; i < startWeekday; i++) cells.push('<span class="cal-day cal-day--empty"></span>');
        for (let day = 1; day <= totalDays; day++) {
          const d = new Date(cur.getFullYear(), cur.getMonth(), day);
          const classes = ['cal-day'];
          if (sel && isSameDay(d, sel)) classes.push('cal-day--selected');
          cells.push(`<button type="button" class="${classes.join(' ')}" data-day="${day}">
            <span class="cal-day__num">${day}</span>
          </button>`);
        }
        while (cells.length < 42) cells.push('<span class="cal-day cal-day--empty"></span>');
        pickerGrid.innerHTML = cells.join('');

        pickerGrid.querySelectorAll('[data-day]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const day = Number(btn.getAttribute('data-day'));
            const selected = new Date(cur.getFullYear(), cur.getMonth(), day);
            const iso = `${selected.getFullYear()}-${pad(selected.getMonth() + 1)}-${pad(selected.getDate())}`;
            selectedDates[pickerField] = iso;
            const displayText = `${DAY_NAMES_LONG[selected.getDay()]}, ${MONTH_NAMES[selected.getMonth()]} ${selected.getDate()}, ${selected.getFullYear()}`;
            const displayEl = document.querySelector(`[data-date-display="${pickerField}"]`);
            displayEl.textContent = displayText;
            displayEl.classList.add('pet-form__date-display--filled');
            dateModal.hidden = true;
          });
        });
      }

      function renderYearPicker() {
        pickerGrid.classList.add('cal-month__grid--years');
        const cur = pickerCursor;
        const startYear = cur.getFullYear() - 11;
        const endYear = startYear + 23;
        pickerTitle.innerHTML = `${startYear} � ${endYear}`;

        const selYear = pickerField && selectedDates[pickerField]
          ? new Date(selectedDates[pickerField]).getFullYear() : null;
        const curYear = today.getFullYear();
        const cells = [];
        for (let y = startYear; y <= endYear; y++) {
          const classes = ['cal-year-cell'];
          if (y === selYear) classes.push('cal-year-cell--selected');
          else if (y === curYear) classes.push('cal-year-cell--today');
          cells.push(`<button type="button" class="${classes.join(' ')}" data-year="${y}">${y}</button>`);
        }
        pickerGrid.innerHTML = cells.join('');

        pickerGrid.querySelectorAll('[data-year]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const year = Number(btn.getAttribute('data-year'));
            pickerCursor = new Date(year, pickerCursor.getMonth(), 1);
            pickerMode = 'month';
            renderPicker();
          });
        });
      }

      // Click on title toggles month/year mode
      pickerTitle.style.cursor = 'pointer';
      pickerTitle.addEventListener('click', () => {
        pickerMode = pickerMode === 'month' ? 'year' : 'month';
        renderPicker();
      });

      document.querySelectorAll('[data-date-trigger]').forEach((btn) => {
        btn.addEventListener('click', () => {
          pickerField = btn.getAttribute('data-date-trigger');
          pickerMode = 'month';
          // If a date was already chosen, jump back to that month
          if (selectedDates[pickerField]) {
            pickerCursor = new Date(selectedDates[pickerField]);
            pickerCursor.setDate(1);
          } else if (pickerField === 'birthday') {
            pickerCursor = new Date(today.getFullYear() - 3, today.getMonth(), 1);
          } else {
            pickerCursor = new Date(today.getFullYear(), today.getMonth(), 1);
          }
          renderPicker();
          dateModal.hidden = false;
        });
      });
      document.querySelector('[data-date-close]').addEventListener('click', () => {
        dateModal.hidden = true;
      });
      dateModal.addEventListener('click', (e) => {
        if (e.target === dateModal) dateModal.hidden = true;
      });
      document.querySelector('[data-picker-prev]').addEventListener('click', () => {
        if (pickerMode === 'year') {
          pickerCursor = new Date(pickerCursor.getFullYear() - 24, pickerCursor.getMonth(), 1);
        } else {
          pickerCursor = new Date(pickerCursor.getFullYear(), pickerCursor.getMonth() - 1, 1);
        }
        renderPicker();
      });
      document.querySelector('[data-picker-next]').addEventListener('click', () => {
        if (pickerMode === 'year') {
          pickerCursor = new Date(pickerCursor.getFullYear() + 24, pickerCursor.getMonth(), 1);
        } else {
          pickerCursor = new Date(pickerCursor.getFullYear(), pickerCursor.getMonth() + 1, 1);
        }
        renderPicker();
      });

      // ----- Submit -----
      const form = document.querySelector('[data-pet-form]');
      const successSheet   = document.getElementById('petSuccessSheet');
      const successBackdrop = document.getElementById('petSuccessBackdrop');

      function openSuccessSheet() {
        successBackdrop.classList.add('pet-success-backdrop--open');
        successSheet.style.display = 'flex';
        successSheet.setAttribute('aria-hidden', 'false');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            successSheet.classList.add('pet-success-sheet--open');
          });
        });
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const data = new FormData(form);
        const pet = {
          id: P.newPetId(),
          photo: photoData,
          name: String(data.get('name') || '').trim(),
          unitNumber: String(data.get('unitNumber') || ''),
          designation: String(data.get('designation') || ''),
          type: String(data.get('type') || ''),
          breed: String(data.get('breed') || ''),
          color: String(data.get('color') || '').trim(),
          weight: String(data.get('weight') || '').trim(),
          microchipNumber: String(data.get('microchipNumber') || '').trim(),
          birthday: selectedDates.birthday || null,
          vaccineDate: selectedDates.vaccineDate || null,
          vaccineExpiration: selectedDates.vaccineExpiration || null,
          notes: String(data.get('notes') || '').trim(),
          status: 'pending',
          createdAt: Date.now()
        };
        P.addPet(pet);
        openSuccessSheet();
      });
    })();
  </script>
  <script src="scripts/app.js"></script>
</body>
</html>
