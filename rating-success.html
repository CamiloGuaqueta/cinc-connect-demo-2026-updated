<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect &#8212; Rating Submitted</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen pay-screen--full">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <header class="pay-sheet__header">
          <span></span>
          <span class="pay-sheet__title">Ratings</span>
          <span></span>
        </header>
        <div class="pay-sheet__sep"></div>

        <div class="pay-sheet__body">
          <div class="wo-success-body">

            <div class="wo-success-icon">
              <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
                <path d="M10 18l6 6 10-12" stroke="#b2de61" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>

            <h2 class="wo-success-title">Thank You For Your Rating!</h2>
            <p class="wo-success-text">Your feedback helps the community make better decisions about the services we use.</p>

          </div>
        </div>

        <div class="pay-sheet__footer">
          <a class="pay-continue" href="ratings.html">DONE</a>
        </div>

      </div>
    </div>
  </div>

  <script src="scripts/auth.js"></script>
  <script>window.CincAuth.requireAuth();</script>
</body>
</html>
