<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect � Reservation Confirmed</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />

<body class="ap-body">
  <div class="app-frame ap-frame">

    <!-- Previous screen peek -->
    <div class="ap-peek" aria-hidden="true"></div>

    <!-- Confirmation panel -->
    <section class="ap-panel confirm-panel">
        <!-- Hero -->
        <div class="amenity-sheet__hero confirm-sheet__hero">
          <img class="amenity-sheet__hero-img" data-amenity-image src="" alt="" />
          <a class="amenity-sheet__close" href="amenities.html" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="6" y1="6" x2="18" y2="18"/>
              <line x1="6" y1="18" x2="18" y2="6"/>
            </svg>
          </a>
        </div>

        <!-- Overlapping badge -->
        <div class="confirm-sheet__badge" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <polyline points="9 15 11 17 15 13"/>
          </svg>
        </div>

        <!-- Body -->
        <div class="confirm-sheet__body">
          <h1 class="confirm-sheet__title">Booking Confirmed!</h1>
          <p class="confirm-sheet__subtitle">Your reservation has been successfully placed.</p>

          <hr class="confirm-sheet__divider" />

          <h2 class="confirm-sheet__amenity-name" data-amenity-name>�</h2>
          <div class="confirm-sheet__meta">
            <span data-confirm-date>�</span>
            <span class="confirm-sheet__meta-sep">�</span>
            <span data-confirm-slot>�</span>
          </div>
          <div class="confirm-sheet__meta">Guests: <span data-confirm-guests>�</span></div>

          <!-- Reservation Fee Receipt (paid only) -->
          <button class="confirm-sheet__receipt" type="button" data-receipt-row hidden>
            <span class="confirm-sheet__receipt-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <line x1="9" y1="15" x2="15" y2="15"/>
              </svg>
            </span>
            <span class="confirm-sheet__receipt-label">Reservation Fee Receipt</span>
            <span class="confirm-sheet__receipt-chevron" aria-hidden="true">�</span>
          </button>

          <!-- Info card -->
          <ul class="amenity-sheet__info confirm-sheet__info">
            <li>
              <span class="amenity-sheet__info-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                  <circle cx="12" cy="10" r="3"/>
                </svg>
              </span>
              <span data-amenity-address>�</span>
            </li>
            <li>
              <span class="amenity-sheet__info-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/>
                </svg>
              </span>
              <span data-amenity-phone>�</span>
            </li>
            <li>
              <span class="amenity-sheet__info-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
              </span>
              <span data-pdf-title>�</span>
            </li>
          </ul>

          <div class="booth-prize" style="margin-top:20px;">
            <span class="booth-prize__icon">🏓</span>
            <div>
              <span class="booth-prize__label">CAI Annual 2026</span>
              <span class="booth-prize__title">Now go have some fun!</span>
              <span class="booth-prize__note">Show this screen at the CINC booth to claim your Mini Foosball Table and jump into the game.</span>
            </div>
          </div>

          <button class="btn btn--primary confirm-sheet__cta" type="button" data-share-btn>SHARE RESERVATION</button>
        </div>
    </section>

  </div>

  <script src="scripts/amenities-data.js"></script>
  <script src="scripts/app-dialogs.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      const D = window.AmenitiesData;
      const a = D.findById(id) || D.AMENITIES[0];

      function formatTimeRange(s) {
        if (!s) return '';
        const m = s.match(/^(\d+):(\d+)\s*(AM|PM)$/i);
        if (!m) return s;
        let h = parseInt(m[1], 10);
        const min = parseInt(m[2], 10);
        const isPM = m[3].toUpperCase() === 'PM';
        let h24 = h % 12 + (isPM ? 12 : 0);
        const endH24 = h24 + 1;
        const endMin = (min + 30) % 60;
        const carry = (min + 30) >= 60 ? 1 : 0;
        const endH = ((endH24 + carry - 1) % 12) + 1;
        const endIsPM = ((endH24 + carry) % 24) >= 12;
        return `${s} � ${endH}:${String(endMin).padStart(2, '0')} ${endIsPM ? 'PM' : 'AM'}`;
      }

      document.querySelector('[data-amenity-image]').src = a.image;
      document.querySelector('[data-amenity-name]').textContent = a.name;
      document.querySelector('[data-amenity-address]').textContent = a.address;
      document.querySelector('[data-amenity-phone]').textContent = a.phone;
      document.querySelector('[data-pdf-title]').textContent = a.pdfTitle;
      document.querySelector('[data-confirm-date]').textContent = params.get('date') || '';
      document.querySelector('[data-confirm-slot]').textContent = formatTimeRange(params.get('slot') || '');
      document.querySelector('[data-confirm-guests]').textContent = params.get('guests') || '1';

      // Show receipt row only for paid bookings
      if (params.get('paid') === '1') {
        document.querySelector('[data-receipt-row]').hidden = false;
      }

      // -- Save reservation to session storage ------------------------------
      (function saveReservation() {
        const NS = 'cinc:demo:';
        const KEY = NS + 'reservations';
        let list = [];
        try { list = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (_) {}

        const slotParam  = params.get('slot')    || '';
        const endSlotParam = params.get('endSlot') || '';
        const timeRange  = endSlotParam ? `${slotParam} · ${endSlotParam}` : formatTimeRange(slotParam);

        // Deduplicate: same amenity + date + slot = same booking
        const key = `${a.id}|${params.get('date')}|${slotParam}`;
        const already = list.some((r) => r.key === key);
        if (!already) {
          list.unshift({
            key,
            amenityId:  a.id,
            name:       a.name,
            image:      a.image,
            date:       params.get('date')   || '',
            slot:       slotParam,
            timeRange,
            guests:     params.get('guests') || '1',
            paid:       params.get('paid') === '1',
            total:      parseFloat(params.get('total')   || '0'),
            deposit:    parseFloat(params.get('deposit') || '0'),
            savedAt:    Date.now()
          });
          localStorage.setItem(KEY, JSON.stringify(list));
        }
      })();

      // Share button (demo: native share or on-brand dialog fallback)
      document.querySelector('[data-share-btn]').addEventListener('click', async () => {
        const text = `${a.name} reservation on ${params.get('date')} at ${params.get('slot')}`;
        if (navigator.share) {
          try { await navigator.share({ title: 'Reservation', text }); } catch (_) {}
        } else {
          await window.AppDialog.alert({
            title: 'Share your reservation',
            message: text,
            confirmLabel: 'Got it'
          });
        }
      });
    })();
  </script>
  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
</body>
</html>
