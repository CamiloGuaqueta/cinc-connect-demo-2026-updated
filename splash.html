<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css" />

  <style>
    /* Auto-redirect to login after splash */
    body { background: #112719; }
  </style>
</head>
<body>
  <div class="app-frame">
    <main class="splash">
      <div class="splash__bg" role="img" aria-label="CINC Connect splash"></div>
    </main>
  </div>

  <script>
    // Auto-redirect to login after a short splash delay
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);
  </script>
</body>
</html>
