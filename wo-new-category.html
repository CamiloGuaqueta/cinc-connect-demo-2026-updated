<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#112719" />
  <title>CINC Connect — New Work Order</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>try{if(localStorage.getItem('cinc:demo:brand')==='custom')document.documentElement.setAttribute('data-brand','custom');}catch(_){}</script>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/screens.css?v=4" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="app-frame">
    <div class="pay-screen pay-screen--full">
      <div class="pay-screen__backdrop"></div>
      <div class="pay-sheet">

        <header class="pay-sheet__header">
          <a class="pay-sheet__back" id="backBtn" href="wo-new-unit.html" aria-label="Back">
            <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
              <path d="M9 1L1 9L9 17" stroke="#b2de61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <span class="pay-sheet__title">New Work Order</span>
          <a class="pay-sheet__close" href="my-work-orders.html">Close</a>
        </header>
        <div class="pay-sheet__sep"></div>

        <div class="pay-sheet__body">

          <p class="filter-section__title">Select WO Category</p>
          <div class="filter-group">
            <div class="filter-row wo-cat-row" data-cat="Plumbing">
              <span class="filter-row__label">Plumbing</span>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">
                <path d="M1 1l6 6-6 6" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-row wo-cat-row" data-cat="Electrical">
              <span class="filter-row__label">Electrical</span>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">
                <path d="M1 1l6 6-6 6" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-row wo-cat-row" data-cat="HVAC">
              <span class="filter-row__label">HVAC / Air Conditioning</span>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">
                <path d="M1 1l6 6-6 6" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-row wo-cat-row" data-cat="Landscaping">
              <span class="filter-row__label">Landscaping</span>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">
                <path d="M1 1l6 6-6 6" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-row wo-cat-row" data-cat="Painting">
              <span class="filter-row__label">Painting</span>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">
                <path d="M1 1l6 6-6 6" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-row wo-cat-row" data-cat="Roofing">
              <span class="filter-row__label">Roofing</span>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">
                <path d="M1 1l6 6-6 6" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-row wo-cat-row" data-cat="Pest Control">
              <span class="filter-row__label">Pest Control</span>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">
                <path d="M1 1l6 6-6 6" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-row wo-cat-row" data-cat="General Maintenance">
              <span class="filter-row__label">General Maintenance</span>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">
                <path d="M1 1l6 6-6 6" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="filter-row wo-cat-row" data-cat="Security">
              <span class="filter-row__label">Security</span>
              <svg width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">
                <path d="M1 1l6 6-6 6" stroke="#b2de61" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

        </div><!-- /.pay-sheet__body -->

      </div><!-- /.pay-sheet -->
    </div><!-- /.pay-screen -->
  </div><!-- /.app-frame -->

  <script src="scripts/auth.js"></script>
  <script>if (!window.CincAuth.requireAuth()) { /* redirected */ }</script>
  <script src="scripts/app.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var unit   = params.get('unit') || '';

      // Back button preserves unit param
      var backBtn = document.getElementById('backBtn');
      if (unit) backBtn.href = 'wo-new-unit.html';

      // Category row click → navigate to catitem with params
      document.querySelectorAll('.wo-cat-row').forEach(function (row) {
        row.style.cursor = 'pointer';
        row.addEventListener('click', function () {
          var cat = row.getAttribute('data-cat');
          window.location.href = 'wo-new-catitem.html?unit=' + encodeURIComponent(unit) + '&cat=' + encodeURIComponent(cat);
        });
      });
    })();
  </script>
</body>
</html>
